<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Brain Teaser | Adaptive Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0B0C10 0%, #0F1117 100%);
      color: #E6EDF3;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Premium glassmorphism */
    .glass {
      background: rgba(20, 25, 35, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo i {
      font-size: 32px;
      background: linear-gradient(135deg, #A855F7, #3B82F6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #F0F9FF, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .api-status {
      background: rgba(0,0,0,0.4);
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: rgba(15, 20, 30, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 18px 12px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      border-color: rgba(168, 85, 247, 0.4);
      transform: translateY(-3px);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #E2E8F0, #A855F7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94A3B8;
      margin-top: 8px;
    }

    /* Category & Difficulty pills */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .pill {
      background: rgba(30, 35, 48, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .pill.active {
      background: linear-gradient(135deg, #A855F7, #3B82F6);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 12px rgba(168,85,247,0.3);
    }

    /* Question Card */
    .question-card {
      background: rgba(15, 20, 30, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .card-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
      gap: 12px;
    }

    .difficulty-badge {
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(168,85,247,0.2);
      color: #C084FC;
    }

    .timer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: monospace;
      font-weight: 600;
      font-size: 1.2rem;
    }

    .question-text {
      padding: 28px 24px 16px;
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.4;
    }

    .options {
      padding: 8px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: rgba(30, 35, 48, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option:hover:not(.disabled) {
      background: rgba(168,85,247,0.15);
      border-color: rgba(168,85,247,0.5);
    }

    .option.selected {
      background: rgba(168,85,247,0.2);
      border-color: #A855F7;
    }

    .option.correct {
      background: rgba(16,185,129,0.2);
      border-color: #10B981;
    }

    .option.wrong {
      background: rgba(239,68,68,0.2);
      border-color: #EF4444;
    }

    .option-letter {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.08);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .option-text {
      flex: 1;
    }

    .feedback {
      margin: 0 24px 24px;
      padding: 16px 20px;
      border-radius: 24px;
      background: rgba(0,0,0,0.4);
      border-left: 4px solid #A855F7;
    }

    .actions {
      display: flex;
      gap: 16px;
      padding: 8px 24px 28px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      border: none;
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #A855F7, #3B82F6);
      box-shadow: 0 2px 8px rgba(168,85,247,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.2);
    }

    .level-progress {
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      height: 8px;
      width: 100%;
      margin-top: 12px;
      overflow: hidden;
    }

    .level-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #A855F7, #3B82F6);
      transition: width 0.3s ease;
    }

    /* Settings modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }

    .modal.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #11161F;
      border-radius: 32px;
      max-width: 500px;
      width: 90%;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .modal input {
      width: 100%;
      background: #1E293B;
      border: 1px solid #334155;
      padding: 12px 16px;
      border-radius: 40px;
      color: white;
      margin: 16px 0;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1E293B;
      padding: 12px 24px;
      border-radius: 60px;
      color: white;
      z-index: 2000;
      display: none;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <i class="fas fa-brain"></i>
      <h1>AI Brain Teaser</h1>
    </div>
    <div class="api-status" id="apiStatus">
      <i class="fas fa-key"></i> <span id="apiKeyStatus">API Key not set</span>
      <button class="btn" style="padding:4px 12px;" id="settingsBtn"><i class="fas fa-cog"></i></button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="levelDisplay">1</div><div class="stat-label">Level</div></div>
    <div class="stat-card"><div class="stat-value" id="iqDisplay">100</div><div class="stat-label">IQ Score</div></div>
    <div class="stat-card"><div class="stat-value" id="streakDisplay">0</div><div class="stat-label">Streak 🔥</div></div>
    <div class="stat-card"><div class="stat-value" id="correctDisplay">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-card"><div class="stat-value" id="accDisplay">0%</div><div class="stat-label">Accuracy</div></div>
  </div>

  <div class="filters" id="categoryFilter">
    <div class="pill active" data-cat="logic">Logic</div>
    <div class="pill" data-cat="math">Math</div>
    <div class="pill" data-cat="pattern">Pattern</div>
    <div class="pill" data-cat="verbal">Verbal</div>
    <div class="pill" data-cat="riddle">Riddle</div>
  </div>

  <div class="question-card">
    <div class="card-header">
      <span class="difficulty-badge" id="difficultyBadge">Easy</span>
      <div class="timer"><i class="far fa-clock"></i> <span id="timerText">00:30</span></div>
    </div>
    <div class="question-text" id="questionText">Click "New Question" to start.</div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedbackBox" style="display:none;"></div>
    <div class="actions">
      <button class="btn btn-outline" id="hintBtn"><i class="fas fa-lightbulb"></i> Hint</button>
      <button class="btn btn-primary" id="submitBtn" disabled>Submit</button>
      <button class="btn btn-primary" id="nextBtn" style="display:none;">Next Question</button>
    </div>
    <div class="level-progress" id="levelProgressBar"><div class="level-fill" id="levelFill"></div></div>
  </div>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3><i class="fas fa-key"></i> OpenAI API Key</h3>
    <p style="color:#94A3B8; margin-top:8px;">Enter your OpenAI API key to generate questions. It is stored locally.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn" id="closeModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveApiKeyBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---------- STATE ----------
  let userStats = {
    level: 1,
    iq: 100,
    streak: 0,
    totalCorrect: 0,
    totalPlayed: 0,
    currentXP: 0,
    xpToNextLevel: 100
  };

  let currentQuestion = null;
  let selectedOption = null;
  let answered = false;
  let timerInterval = null;
  let timeLeft = 30;
  let apiKey = localStorage.getItem('openai_key') || '';

  // DOM elements
  const levelSpan = document.getElementById('levelDisplay');
  const iqSpan = document.getElementById('iqDisplay');
  const streakSpan = document.getElementById('streakDisplay');
  const correctSpan = document.getElementById('correctDisplay');
  const accSpan = document.getElementById('accDisplay');
  const difficultyBadge = document.getElementById('difficultyBadge');
  const questionText = document.getElementById('questionText');
  const optionsDiv = document.getElementById('optionsContainer');
  const feedbackBox = document.getElementById('feedbackBox');
  const submitBtn = document.getElementById('submitBtn');
  const nextBtn = document.getElementById('nextBtn');
  const hintBtn = document.getElementById('hintBtn');
  const levelFill = document.getElementById('levelFill');
  const timerSpan = document.getElementById('timerText');

  let currentCategory = 'logic';

  // Load stats from localStorage
  function loadStats() {
    const saved = localStorage.getItem('brain_teaser_stats');
    if (saved) {
      userStats = JSON.parse(saved);
    }
    updateUIStats();
  }

  function saveStats() {
    localStorage.setItem('brain_teaser_stats', JSON.stringify(userStats));
  }

  function updateUIStats() {
    levelSpan.innerText = userStats.level;
    iqSpan.innerText = userStats.iq;
    streakSpan.innerText = userStats.streak;
    correctSpan.innerText = userStats.totalCorrect;
    const acc = userStats.totalPlayed === 0 ? 0 : Math.round((userStats.totalCorrect / userStats.totalPlayed) * 100);
    accSpan.innerText = acc + '%';
    // XP progress
    const progressPercent = (userStats.currentXP / userStats.xpToNextLevel) * 100;
    levelFill.style.width = progressPercent + '%';
  }

  function addXP(amount) {
    userStats.currentXP += amount;
    while (userStats.currentXP >= userStats.xpToNextLevel) {
      userStats.currentXP -= userStats.xpToNextLevel;
      userStats.level++;
      userStats.xpToNextLevel = Math.floor(userStats.xpToNextLevel * 1.2);
      toast(`🎉 Level Up! You are now level ${userStats.level}`, 3000);
    }
    saveStats();
    updateUIStats();
  }

  // Get difficulty based on level
  function getDifficultyFromLevel() {
    if (userStats.level <= 3) return 'easy';
    if (userStats.level <= 7) return 'medium';
    if (userStats.level <= 12) return 'hard';
    return 'expert';
  }

  // Update badge
  function updateDifficultyBadge() {
    const diff = getDifficultyFromLevel();
    difficultyBadge.innerText = diff.charAt(0).toUpperCase() + diff.slice(1);
    difficultyBadge.style.background = diff === 'easy' ? 'rgba(16,185,129,0.2)' : diff === 'medium' ? 'rgba(245,158,11,0.2)' : diff === 'hard' ? 'rgba(239,68,68,0.2)' : 'rgba(168,85,247,0.2)';
    difficultyBadge.style.color = diff === 'easy' ? '#10B981' : diff === 'medium' ? '#F59E0B' : diff === 'hard' ? '#EF4444' : '#A855F7';
  }

  // OpenAI call
  async function generateQuestion() {
    if (!apiKey) {
      toast('Please set your OpenAI API key in settings', 3000);
      document.getElementById('settingsModal').classList.add('active');
      return false;
    }

    const difficulty = getDifficultyFromLevel();
    const prompt = `Generate a challenging ${difficulty} difficulty multiple-choice question about ${currentCategory}. 
    Return JSON strictly in this format: 
    {
      "question": "the question text",
      "options": ["A) option1", "B) option2", "C) option3", "D) option4"],
      "correct": "A) option1" (exact string match to one option),
      "explanation": "detailed explanation of the answer",
      "hint": "a short hint"
    }
    Make sure the correct answer matches exactly one of the options strings.`;

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          response_format: { type: "json_object" }
        })
      });

      if (!response.ok) throw new Error('API error');
      const data = await response.json();
      const content = data.choices[0].message.content;
      const parsed = JSON.parse(content);
      return parsed;
    } catch (err) {
      console.error(err);
      toast('Failed to generate question. Check API key.', 4000);
      return null;
    }
  }

  async function loadNewQuestion() {
    // reset UI
    clearTimer();
    answered = false;
    selectedOption = null;
    submitBtn.disabled = true;
    nextBtn.style.display = 'none';
    feedbackBox.style.display = 'none';
    hintBtn.disabled = false;
    optionsDiv.innerHTML = '';
    questionText.innerText = 'Generating AI question...';
    updateDifficultyBadge();

    const q = await generateQuestion();
    if (!q) return;

    currentQuestion = q;
    questionText.innerText = q.question;
    // Render options
    q.options.forEach((opt, idx) => {
      const letter = String.fromCharCode(65+idx);
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${opt}</div>`;
      div.dataset.value = opt;
      div.addEventListener('click', () => selectOption(div, opt));
      optionsDiv.appendChild(div);
    });

    startTimer(30);
  }

  function selectOption(el, optValue) {
    if (answered) return;
    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedOption = optValue;
    submitBtn.disabled = false;
  }

  function startTimer(seconds) {
    timeLeft = seconds;
    updateTimerDisplay();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!answered && timeLeft > 0) {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft === 0) {
          clearInterval(timerInterval);
          autoTimeout();
        }
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    timerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    if (timeLeft <= 5) timerSpan.style.color = '#EF4444';
    else timerSpan.style.color = '';
  }

  function clearTimer() {
    if (timerInterval) clearInterval(timerInterval);
  }

  async function autoTimeout() {
    if (answered) return;
    answered = true;
    submitBtn.disabled = true;
    // mark correct answer
    const correctOption = currentQuestion.correct;
    document.querySelectorAll('.option').forEach(opt => {
      if (opt.dataset.value === correctOption) opt.classList.add('correct');
      opt.style.pointerEvents = 'none';
    });
    userStats.totalPlayed++;
    userStats.streak = 0;
    userStats.iq = Math.max(80, userStats.iq - 2);
    saveStats();
    updateUIStats();

    feedbackBox.style.display = 'block';
    feedbackBox.innerHTML = `<strong><i class="fas fa-clock"></i> Time's up!</strong><br>${currentQuestion.explanation}`;
    nextBtn.style.display = 'inline-flex';
    hintBtn.disabled = true;
  }

  async function submitAnswer() {
    if (answered || !selectedOption) return;
    answered = true;
    clearTimer();
    submitBtn.disabled = true;
    const isCorrect = selectedOption === currentQuestion.correct;

    // Update stats
    userStats.totalPlayed++;
    if (isCorrect) {
      userStats.totalCorrect++;
      userStats.streak++;
      const points = getDifficultyFromLevel() === 'easy' ? 10 : getDifficultyFromLevel() === 'medium' ? 15 : getDifficultyFromLevel() === 'hard' ? 20 : 30;
      userStats.iq += points;
      addXP(points);
      toast(`✅ Correct! +${points} IQ`, 2000);
    } else {
      userStats.streak = 0;
      userStats.iq = Math.max(80, userStats.iq - 3);
      toast(`❌ Wrong! -3 IQ`, 2000);
    }
    saveStats();
    updateUIStats();

    // Highlight correct/wrong
    document.querySelectorAll('.option').forEach(opt => {
      opt.style.pointerEvents = 'none';
      if (opt.dataset.value === currentQuestion.correct) opt.classList.add('correct');
      if (opt.dataset.value === selectedOption && !isCorrect) opt.classList.add('wrong');
    });

    feedbackBox.style.display = 'block';
    feedbackBox.innerHTML = `<strong>${isCorrect ? 'Correct!' : 'Wrong!'}</strong><br>${currentQuestion.explanation}`;
    nextBtn.style.display = 'inline-flex';
    hintBtn.disabled = true;
  }

  async function hintAction() {
    if (!currentQuestion || answered) return;
    toast(`💡 Hint: ${currentQuestion.hint}`, 5000);
    hintBtn.disabled = true;
    userStats.iq = Math.max(80, userStats.iq - 2);
    saveStats();
    updateUIStats();
  }

  function nextQuestion() {
    loadNewQuestion();
  }

  function toast(msg, duration=3000) {
    const toastEl = document.getElementById('toast');
    toastEl.innerText = msg;
    toastEl.style.display = 'block';
    setTimeout(() => { toastEl.style.display = 'none'; }, duration);
  }

  // Settings Modal
  const settingsModal = document.getElementById('settingsModal');
  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('apiKeyInput').value = apiKey;
    settingsModal.classList.add('active');
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => settingsModal.classList.remove('active'));
  document.getElementById('saveApiKeyBtn').addEventListener('click', () => {
    const newKey = document.getElementById('apiKeyInput').value.trim();
    if (newKey) {
      apiKey = newKey;
      localStorage.setItem('openai_key', apiKey);
      document.getElementById('apiKeyStatus').innerText = 'API Key set';
    } else {
      apiKey = '';
      localStorage.removeItem('openai_key');
      document.getElementById('apiKeyStatus').innerText = 'API Key not set';
    }
    settingsModal.classList.remove('active');
    toast('API Key saved', 2000);
  });

  // Category switch
  document.querySelectorAll('.pill[data-cat]').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-cat]').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentCategory = pill.dataset.cat;
      // Reset and load new question
      if (apiKey) loadNewQuestion();
      else toast('Please set API key first', 2000);
    });
  });

  // Event listeners
  submitBtn.addEventListener('click', submitAnswer);
  nextBtn.addEventListener('click', nextQuestion);
  hintBtn.addEventListener('click', hintAction);

  // init
  loadStats();
  if (apiKey) {
    document.getElementById('apiKeyStatus').innerText = 'API Key set';
    loadNewQuestion();
  } else {
    document.getElementById('apiKeyStatus').innerText = 'API Key not set';
    questionText.innerText = 'Enter your OpenAI API key in settings to start generating adaptive questions.';
  }
</script>

</body>
</html>
