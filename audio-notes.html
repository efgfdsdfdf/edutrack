    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
function viewNote(id) {
    const userData = JSON.parse(localStorage.getItem('userData') || '{}');
    const user = userData[AppState.currentUser.username];
    if(!user) return;
    const note = user.notes.find(n => n.id === id);
    if(note) {
        document.getElementById('modalNoteTitle').textContent = note.title;
        document.getElementById('modalNoteMeta').textContent = note.subject + '  ' + new Date(note.date).toLocaleString();
        document.getElementById('modalNoteContent').innerHTML = note.content || '<p>No content available</p>';
        document.getElementById('noteModal').classList.add('active');
    }
}
function viewRecording(id) {
    alert("Recording view not fully implemented. Check notes.");
}

        .notes-content h3 { font-size: 1.3rem; }
        .notes-content h4 { font-size: 1.1rem; }

        .notes-content p {
            line-height: 1.7;
            margin-bottom: 1rem;
            color: #333;
        }

        .notes-content ul, .notes-content ol {
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .notes-content li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .notes-content strong {
            color: #000;
        }

        .notes-content .text-gray {
            color: #666;
        }

        .notes-placeholder {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--gray);
        }

        .placeholder-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Note styling */
        .note-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .note-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-light);
        }

        .section-title {
            font-size: 1.125rem;
            color: var(--light-1);
        }

        .key-points {
            background: rgba(99, 102, 241, 0.05);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin: 1rem 0;
            border-left: 3px solid var(--primary);
        }

        .key-points ul {
            padding-left: 1rem;
        }

        .key-points li {
            margin-bottom: 0.5rem;
            padding-left: 1rem;
            position: relative;
        }

        .key-points li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-size: 1.25rem;
        }

        .definition {
            background: rgba(245, 158, 11, 0.05);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin: 1rem 0;
            border-left: 3px solid var(--accent);
        }

        .definition-term {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ===== DIALOGUE / AI POLISH SECTION ===== */
        .ai-processing-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: var(--radius-md);
            border: 1px dashed var(--primary);
            color: var(--primary-light);
            font-weight: bold;
            animation: pulse 2s infinite;
            margin-bottom: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-message.speaker-a {
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .chat-message.speaker-b {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .chat-speaker-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-message.speaker-a .chat-speaker-name {
            color: var(--primary-light);
        }

        .chat-message.speaker-b .chat-speaker-name {
            color: var(--secondary);
        }

        /* ===== NOTES SECTION ===== */
        .notes-filter {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-primary);
        }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* ===== HISTORY SECTION ===== */
        .history-table-container {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--dark-2);
            min-width: 600px;
        }

        .history-table th,
        .history-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .history-table th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--gray);
        }

        .history-table tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        /* ===== SETTINGS SECTION ===== */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .settings-card {
            background: var(--dark-2);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            gap: 1rem;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-info {
            flex: 1;
            min-width: 0;
        }

        .setting-info h4 {
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            color: var(--light-1);
        }

        .setting-info p {
            font-size: 0.75rem;
            color: var(--gray);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            flex-shrink: 0;
        }

        .toggle-checkbox {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-full);
            transition: var(--transition);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-checkbox:checked + .toggle-slider {
            background: var(--primary);
        }

        .toggle-checkbox:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background: var(--dark-2);
            border-radius: var(--radius-md);
            padding: 1rem;
            min-width: 300px;
            max-width: 350px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            transform: translateX(100%);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-left-color: var(--secondary); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--info); }

        .toast-icon {
            font-size: 1.25rem;
            margin-top: 0.125rem;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { color: var(--secondary); }
        .toast.error .toast-icon { color: var(--danger); }
        .toast.warning .toast-icon { color: var(--warning); }
        .toast.info .toast-icon { color: var(--info); }

        .toast-content {
            flex: 1;
            min-width: 0;
        }

        .toast-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--light-1);
            font-size: 0.875rem;
        }

        .toast-message {
            font-size: 0.875rem;
            color: var(--gray);
            line-height: 1.4;
        }

        .toast-close {
            color: var(--gray);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            padding: 0.25rem;
        }

        .toast-close:hover {
            color: var(--light-1);
            transform: rotate(90deg);
        }

        /* ===== MODAL (simplified, for upload) ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--dark-2);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dark-2);
        }

        .modal-title {
            font-size: 1.25rem;
            color: var(--light-1);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: var(--dark-2);
        }

        .file-upload-area {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(99, 102, 241, 0.05);
        }

        .file-upload-area:hover {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(99, 102, 241, 0.08);
        }

        .file-info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
        }

        /* ===== UTILITY CLASSES ===== */
        .hidden {
            display: none !important;
        }

        .w-full {
            width: 100%;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .text-center {
            text-align: center;
        }

        .text-gray {
            color: var(--gray);
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-xs {
            font-size: 0.75rem;
        }

        /* Menu Toggle for mobile */
        .menu-toggle {
            display: none;
            width: 50px;
            height: 50px;
            border-radius: var(--radius-md);
            background: rgba(99, 102, 241, 0.1);
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--primary-light);
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 999;
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 1200px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: flex;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
                height: auto;
                min-height: var(--header-height);
                flex-wrap: wrap;
            }
            .content-wrapper {
                padding: 1rem;
            }
            .recording-card, .notes-display {
                padding: 1.5rem;
            }
            .recording-controls {
                flex-direction: column;
            }
            .btn-lg {
                width: 100%;
                justify-content: center;
            }
            .time-display {
                font-size: 2.5rem;
            }
            .quick-stats, .quick-actions, .notes-grid, .notes-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .sidebar {
                width: 100%;
            }
            .toast {
                min-width: 250px;
            }
        }
        /* =========================================
           IMMERSIVE STUDIO UI REDESIGN
           ========================================= */
        #recordSection {
            background: radial-gradient(circle at center, #0f071f 0%, #000000 100%);
            position: relative;
            min-height: calc(100vh - 80px);
            margin: -2rem; /* Overrides the main-content padding */
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #recordSection .recording-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: all 0.5s ease;
        }

        /* When notes are generated, switch to split pane */
        #recordSection.has-output .recording-container {
            flex-direction: row;
            align-items: stretch;
        }

        #recordSection .recording-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #recordSection.has-output .recording-card {
            width: 40%;
            padding: 2rem;
        }

        /* Glowing ambient orb behind the recording card */
        #recordSection::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.25) 0%, rgba(6, 182, 212, 0.15) 40%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 4s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        #recordSection .recording-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        #recordSection .recording-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        #recordSection .waveform {
            height: 120px;
            width: 100%;
            max-width: 500px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 2rem;
        }

        #recordSection .wave-bar {
            width: 6px;
            margin: 0 2px;
            background: linear-gradient(to top, #4f46e5, #06b6d4);
            border-radius: 10px;
            transition: height 0.05s ease;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        #recordSection .time-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            font-family: monospace;
            margin-bottom: 1.5rem;
        }

        #recordSection #recordBtn {
            border-radius: 50px;
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        #recordSection #recordBtn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.6);
        }

        #recordSection .notes-display {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            z-index: 2;
            display: none;
        }

        #recordSection.has-output .notes-display {
            display: flex;
            flex-direction: column;
            width: 60%;
            max-width: none;
        }

        .light-theme #recordSection {
            background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%);
        }
        .light-theme #recordSection .recording-title {
            background: linear-gradient(135deg, #0f172a 0%, #4f46e5 100%);
            -webkit-background-clip: text;
        }
        .light-theme #recordSection .recording-card, .light-theme #recordSection.has-output .notes-display {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
        }
        .light-theme #recordSection .waveform {
            background: #fff;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
        }
        .light-theme #recordSection .time-display {
            color: #0f172a;
            text-shadow: none;
        }
            /* General Mobile Responsiveness */
        @media (max-width: 768px) {
            .sections-container {
                padding: 4rem 1rem 1rem 1rem !important;
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .history-table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .history-table th, .history-table td {
                padding: 0.75rem 0.5rem;
                font-size: 0.9rem;
            }
            .notes-grid {
                grid-template-columns: 1fr;
            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            /* Adjust Back to Hub button for mobile */
            a[href="audio-hub.html"] {
                top: 1rem !important;

                <button class="btn btn-secondary" id="cancelUpload">Cancel</button>
                <button class="btn btn-primary" id="processUpload" disabled>Process</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // APP STATE
        // ============================================
        const AppState = {
            currentUser: null,
            isRecording: false,
            recordingTime: 0,
            timerInterval: null,
            mediaRecorder: null,
            audioChunks: [],
            audioBlob: null,
            speechRecognition: null,
            transcript: '',          // holds what the user said
            finalTranscript: '',
            currentNotes: null,
            uploadedFile: null,
            waveformInterval: null,
            recognitionActive: false,
            // VAD state
            audioContext: null,
            analyser: null,
            audioSource: null,
            silenceTime: 0,
            isSpeaking: false
        };

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
            setupEventListeners();
            setupWaveform();
        });

        async function initializeApp() {
            let currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                const demoUser = { username: 'john_doe', name: 'John Doe', email: 'john@student.com' };
                localStorage.setItem('currentUser', JSON.stringify(demoUser));
                AppState.currentUser = demoUser;
            } else {
                AppState.currentUser = JSON.parse(currentUser);
            }

            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            if (!userData[AppState.currentUser.username]) {
                userData[AppState.currentUser.username] = {
                    totalRecordings: 0,
                    totalNotes: 0,
                    totalMinutes: 0,
                    notes: [],
                    recordings: [],
                    storageUsed: 245
                };
                localStorage.setItem('userData', JSON.stringify(userData));
            }

            updateUserDisplay();
        }

        function updateUserDisplay() {
            // Nothing needed here since header is gone
        }

        function setupWaveform() {
            const waveform = document.getElementById('waveform');
            waveform.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.height = '4px';
                bar.style.setProperty('--i', i);
                waveform.appendChild(bar);
            }
        }

        function startWaveformAnimation(stream) {
            if (AppState.waveformInterval) cancelAnimationFrame(AppState.waveformInterval);
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                AppState.audioContext = new AudioContext();
                AppState.audioSource = AppState.audioContext.createMediaStreamSource(stream);
                AppState.analyser = AppState.audioContext.createAnalyser();
                AppState.analyser.fftSize = 128;
                AppState.audioSource.connect(AppState.analyser);
                
                const dataArray = new Uint8Array(AppState.analyser.frequencyBinCount);
                const bars = document.querySelectorAll('.wave-bar');
                
                let lastTime = performance.now();
                
                function draw() {
                    if (!AppState.isRecording) return;
                    
                    AppState.waveformInterval = requestAnimationFrame(draw);
                    
                    const currentTime = performance.now();
                    const delta = currentTime - lastTime;
                    lastTime = currentTime;
                    
                    AppState.analyser.getByteFrequencyData(dataArray);
                    
                    let sum = 0;
                    for (let i = 0; i < bars.length; i++) {
                        const val = dataArray[i];
                        sum += val;
                        // Smoothly transition heights
                        const currentHeight = parseFloat(bars[i].style.height);
                        const targetHeight = Math.max(4, (val / 255) * 60);
                        bars[i].style.height = `${currentHeight + (targetHeight - currentHeight) * 0.3}px`;
                    }
                    
                    const average = sum / dataArray.length;
                    
                    // Voice Activity Detection (VAD)
                    if (average > 15) {
                        AppState.silenceTime = 0;
                        AppState.isSpeaking = true;
                    } else {
                        AppState.silenceTime += delta;
                        if (AppState.silenceTime > 1500 && AppState.isSpeaking) {
                            // 1.5s of silence detected -> mark pause
                            if (AppState.finalTranscript && !AppState.finalTranscript.endsWith('[PAUSE] ')) {
                                AppState.finalTranscript += ' [PAUSE] ';
                                document.getElementById('transcriptionText').innerHTML = AppState.finalTranscript.replace(/\n/g, '<br>');
                            }
                            AppState.isSpeaking = false;
                        }
                    }
                }
                
                draw();
            } catch (e) {
                console.warn('AudioContext not supported, falling back to dummy animation');
                // Fallback dummy animation
                let tick = 0;
                function dummyDraw() {
                    if (!AppState.isRecording) return;
                    AppState.waveformInterval = requestAnimationFrame(dummyDraw);
                    tick++;
                    document.querySelectorAll('.wave-bar').forEach((bar, i) => {
                        const randomHeight = 4 + Math.max(0, Math.sin(tick / 10 + i * 0.3) * 30);
                        bar.style.height = `${randomHeight}px`;
                    });
                }
                dummyDraw();
            }
        }

        function stopWaveformAnimation() {
            AppState.isRecording = false; // Stop draw loop
            if (AppState.waveformInterval) {
                cancelAnimationFrame(AppState.waveformInterval);
                AppState.waveformInterval = null;
            }
            if (AppState.audioContext && AppState.audioContext.state !== 'closed') {
                AppState.audioContext.close();
            }
            document.querySelectorAll('.wave-bar').forEach(bar => bar.style.height = '4px');
        }        function setupEventListeners() {
            // Navigation
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = link.getAttribute('data-section');
                    if(typeof showSection !== 'undefined') showSection(section);
                });
            });

            document.querySelectorAll('.action-card').forEach(card => {
                card.addEventListener('click', () => {
                    const section = card.getAttribute('data-section');
                    if (section && typeof showSection !== 'undefined') showSection(section);
                });
            });

            const menuToggle = document.getElementById('menuToggle');
            if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
            
            const uploadTrigger = document.getElementById('uploadTrigger');
            if(uploadTrigger) uploadTrigger.addEventListener('click', showUploadModal);
            
            const fileUpload = document.getElementById('fileUpload');
            if(fileUpload) fileUpload.addEventListener('click', showUploadModal);

            // Recording controls
            const recordBtn = document.getElementById('recordBtn');
            if(recordBtn) recordBtn.addEventListener('click', toggleRecording);
            
            const stopBtn = document.getElementById('stopBtn');
            if(stopBtn) stopBtn.addEventListener('click', stopRecording);
            
            const aiProcessBtn = document.getElementById('aiProcessBtn');
            if(aiProcessBtn) aiProcessBtn.addEventListener('click', () => generateNotes('diarize'));
            
            const summaryBtn = document.getElementById('summaryBtn');
            if(summaryBtn) summaryBtn.addEventListener('click', () => generateNotes('summary'));
            
            const detailedBtn = document.getElementById('detailedBtn');
            if(detailedBtn) detailedBtn.addEventListener('click', () => generateNotes('detailed'));

            // Upload modal
            const closeUploadModal = document.getElementById('closeUploadModal');
            if(closeUploadModal) closeUploadModal.addEventListener('click', () => document.getElementById('uploadModal').classList.remove('active'));
            
            const cancelUpload = document.getElementById('cancelUpload');
            if(cancelUpload) cancelUpload.addEventListener('click', () => document.getElementById('uploadModal').classList.remove('active'));

            const dropArea = document.getElementById('dropArea');
            if (dropArea) {
                dropArea.addEventListener('click', () => document.getElementById('modalFileInput').click());
                dropArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropArea.style.borderColor = 'var(--primary)';
                });
                dropArea.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    dropArea.style.borderColor = 'rgba(255,255,255,0.2)';
                });
                dropArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropArea.style.borderColor = 'rgba(255,255,255,0.2)';
                    if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files[0]);
                });
            }

            const modalFileInput = document.getElementById('modalFileInput');
            if(modalFileInput) {
                modalFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length) handleFileSelect(e.target.files[0]);
                });
            }

            const processUpload = document.getElementById('processUpload');
            if(processUpload) processUpload.addEventListener('click', processUploadedFile);

            // Note style selection
            const noteStyle = document.getElementById('noteStyle');
            if(noteStyle) {
                noteStyle.addEventListener('change', (e) => {
                    const type = e.target.value;
                    generateNotes(type);
                });
            }
            
            // Download PDF
            const downloadPdfBtn = document.getElementById('downloadPdfBtn');
            if(downloadPdfBtn) {
                downloadPdfBtn.addEventListener('click', () => {
                    const originalElement = document.getElementById('notesContent');
                    const clone = originalElement.cloneNode(true);
                    clone.style.height = 'auto';
                    clone.style.maxHeight = 'none';
                    clone.style.overflow = 'visible';
                    clone.style.position = 'absolute';
                    clone.style.top = '-9999px';
                    document.body.appendChild(clone);

                    const opt = {
                        margin:       10,
                        filename:     'ACE_Student_Notes.pdf',
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2 },
                        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };
                    html2pdf().set(opt).from(clone).save().then(() => {
                        document.body.removeChild(clone);
                    });
                });
            }

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if(typeof loadAllNotes !== 'undefined') loadAllNotes(e.target.dataset.filter);
                });
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`${sectionId}Section`).classList.add('active');
            document.querySelector(`.nav-link[data-section="${sectionId}"]`).classList.add('active');
            const titles = {
                dashboard: { title: 'Dashboard', subtitle: 'Your study companion' },
                record: { title: 'Record Lecture', subtitle: 'Speak, then generate notes' },
                notes: { title: 'My Notes', subtitle: 'All your saved notes' },
                history: { title: 'History', subtitle: 'Past recordings' },
                settings: { title: 'Settings', subtitle: 'Customize your experience' }
            };
            if (titles[sectionId]) {
                document.getElementById('pageTitle').textContent = titles[sectionId].title;
                document.getElementById('pageSubtitle').textContent = titles[sectionId].subtitle;
            }
            if (window.innerWidth <= 1200) {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('mainContent').classList.add('expanded');
            }
        }

        // ============================================
        // SPEECH RECOGNITION (what the user said)
        // ============================================
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast('Speech recognition not supported in this browser. Try Chrome or Edge.', 'error');
                return null;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        AppState.finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                // Show both final and interim
                document.getElementById('transcriptionText').innerHTML = 
                    (AppState.finalTranscript + interimTranscript).replace(/\n/g, '<br>');
                AppState.transcript = AppState.finalTranscript + interimTranscript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error', event.error);
                if (event.error === 'no-speech') {
                    // ignore
                } else {
                    showToast('Speech recognition error: ' + event.error, 'error');
                    stopRecording();
                }
            };

            recognition.onend = () => {
                if (AppState.recognitionActive) {
                    // Restart if we're still recording but recognition ended unexpectedly
                    try { recognition.start(); } catch (e) {}
                }
            };

            return recognition;
        }

        // ============================================
        // RECORDING
        // ============================================
        async function toggleRecording() {
            if (!AppState.isRecording) {
                await startRecording();
            } else {
                pauseRecording();
            }
        }

        async function startRecording() {
            // Check daily limit
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username] || {};
            const today = new Date().toDateString();
            
            if (user.lastRecordingDate !== today) {
                user.lastRecordingDate = today;
                user.recordingsToday = 0;
            }
            
            if (user.recordingsToday >= 5) {
                showToast('Daily recording limit reached (5/5). Please try again tomorrow!', 'error');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                AppState.mediaRecorder = new MediaRecorder(stream);
                AppState.audioChunks = [];

                AppState.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) AppState.audioChunks.push(event.data);
                };

                AppState.mediaRecorder.onstop = () => {
                    AppState.audioBlob = new Blob(AppState.audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(t => t.stop());
                };

                AppState.mediaRecorder.start();
                AppState.isRecording = true;
                AppState.recognitionActive = true;

                // Reset transcript and layout
                document.getElementById('recordSection').classList.remove('has-output');
                document.querySelector('.notes-display').style.display = 'none';
                
                AppState.finalTranscript = '';
                AppState.transcript = '';
                document.getElementById('transcriptionBox').style.display = 'block';
                document.getElementById('transcriptionText').innerHTML = '';

                // Start speech recognition
                if (!AppState.speechRecognition) {
                    AppState.speechRecognition = initSpeechRecognition();
                }
                if (AppState.speechRecognition) {
                    try {
                        AppState.speechRecognition.start();
                    } catch (e) {}
                }

                // UI updates
                document.getElementById('recordBtn').innerHTML = '<i class="fas fa-pause"></i> Pause';
                document.getElementById('recordBtn').className = 'btn btn-warning btn-lg';
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('statusDot').className = 'status-dot recording';
                document.getElementById('statusText').textContent = 'Recording...';
                document.getElementById('recordingDisplay').classList.add('active');

                startTimer();
                startWaveformAnimation(stream);

                showToast('Recording started. Speak clearly.', 'info');
            } catch (error) {
                showToast('Microphone access denied or not available.', 'error');
            }
        }

        function pauseRecording() {
            if (AppState.mediaRecorder && AppState.isRecording) {
                AppState.mediaRecorder.pause();
                AppState.isRecording = false;
                if (AppState.speechRecognition) {
                    try { AppState.speechRecognition.stop(); } catch (e) {}
                    AppState.recognitionActive = false;
                }

                document.getElementById('recordBtn').innerHTML = '<i class="fas fa-play"></i> Resume';
                document.getElementById('recordBtn').className = 'btn btn-success btn-lg';
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'Paused';
                document.getElementById('recordingDisplay').classList.remove('active');

                stopTimer();
                stopWaveformAnimation();
            }
        }

        function stopRecording() {
            if (AppState.mediaRecorder) {
                AppState.mediaRecorder.stop();
                AppState.isRecording = false;
                if (AppState.speechRecognition) {
                    try { AppState.speechRecognition.stop(); } catch (e) {}
                    AppState.recognitionActive = false;
                }

                document.getElementById('recordBtn').innerHTML = '<i class="fas fa-microphone"></i> Start Recording';
                document.getElementById('recordBtn').className = 'btn btn-primary btn-lg';
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'Stopped';
                document.getElementById('recordingDisplay').classList.remove('active');

                stopTimer();
                stopWaveformAnimation();

                // Show transcription box if we have some text
                if (AppState.finalTranscript.trim() !== '') {
                    document.getElementById('transcriptionText').innerHTML = AppState.finalTranscript.replace(/\n/g, '<br>');
                    document.getElementById('transcriptionBox').style.display = 'block';
                } else {
                    // if no speech detected, maybe show placeholder
                    document.getElementById('transcriptionText').innerHTML = '(No speech detected)';
                    document.getElementById('transcriptionBox').style.display = 'block';
                }

                // Save to user stats
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                const user = userData[AppState.currentUser.username];
                user.totalRecordings = (user.totalRecordings || 0) + 1;
                user.totalMinutes = (user.totalMinutes || 0) + Math.floor(AppState.recordingTime / 60);
                
                // Update daily limits
                const today = new Date().toDateString();
                if (user.lastRecordingDate !== today) {
                    user.lastRecordingDate = today;
                    user.recordingsToday = 0;
                }
                user.recordingsToday = (user.recordingsToday || 0) + 1;
                
                localStorage.setItem('userData', JSON.stringify(userData));
                loadDashboardData();
                showToast(`Recording saved. ${5 - user.recordingsToday} recordings left today.`, 'info');
            }
        }

        function startTimer() {
            AppState.recordingTime = 0;
            updateTimerDisplay();
            AppState.timerInterval = setInterval(() => {
                AppState.recordingTime++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (AppState.timerInterval) clearInterval(AppState.timerInterval);
        }

        function updateTimerDisplay() {
            const m = Math.floor(AppState.recordingTime / 60);
            const s = AppState.recordingTime % 60;
            document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // ============================================
        // FILE UPLOAD
        // ============================================
        function showUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
            document.getElementById('modalFileInfo').style.display = 'none';
            document.getElementById('processUpload').disabled = true;
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) processSelectedFile(file);
        }

        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) processSelectedFile(file);
        }

        function processSelectedFile(file) {
            const valid = ['audio/mpeg','audio/wav','audio/x-wav','audio/m4a','audio/x-m4a','audio/aac','audio/ogg'];
            if (!valid.includes(file.type)) {
                showToast('Please upload an audio file.', 'error');
                return;
            }
            if (file.size > 100 * 1024 * 1024) {
                showToast('File too large (max 100MB).', 'error');
                return;
            }
            document.getElementById('modalFileName').textContent = file.name;
            document.getElementById('modalFileInfo').style.display = 'block';
            document.getElementById('processUpload').disabled = false;
            AppState.uploadedFile = file;
        }

        function processUploadedFile() {
            if (!AppState.uploadedFile) return;
            document.getElementById('uploadModal').classList.remove('active');
            // Simulate transcription from file (in a real app you'd send to server)
            // For demo, we'll set a dummy transcript
            AppState.finalTranscript = "This is a simulated transcription from the uploaded file. In a real implementation, you would process the audio with a speech-to-text service.";
            AppState.transcript = AppState.finalTranscript;
            document.getElementById('transcriptionBox').style.display = 'block';
            document.getElementById('transcriptionText').innerHTML = AppState.finalTranscript;
            showToast('File uploaded. You can now generate notes.', 'success');

            // Update stats
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username];
            user.totalRecordings = (user.totalRecordings || 0) + 1;
            localStorage.setItem('userData', JSON.stringify(userData));
            loadDashboardData();
        }

        // ============================================
        // GENERATE NOTES (summary or detailed)
        // ============================================
        async function processWithAI(transcript, type) {
            const prompt = type === 'diarize'
                ? `You are a premium AI transcription editor. Your task is to process this raw, unpunctuated audio transcript. It contains "[PAUSE]" markers indicating silence.
1. Clean up transcription errors and remove filler words (ums, ahs).
2. Perform Speaker Diarization. Identify natural conversational turns (e.g., between two or more people) based on the context and the [PAUSE] markers.
3. Format the output as a beautiful dialogue using these specific HTML classes:
For the overall container use <div class="chat-container">
For each message use:
<div class="chat-message speaker-a"><div class="chat-speaker-name">Speaker A</div>The message text</div>
Alternate to speaker-b for the other speaker:
<div class="chat-message speaker-b"><div class="chat-speaker-name">Speaker B</div>The message text</div>
Return ONLY the raw HTML string, no markdown formatting blocks, no extra text.`
                : `You are an expert AI study assistant. Please summarize the following transcript into a well-structured document that is perfect for reading as a PDF.
- Identify the main topics discussed and use <h2> and <h3> tags for topic headers.
- Write a short summary paragraph for each topic.
- Include a "Key Takeaways" or "Action Items" bulleted list (<ul>/<li>) at the end.
Format the output using clean, semantic HTML. Do not use markdown backticks, just raw HTML.`;

            const response = await fetch('http://localhost:3000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: prompt },
                        { role: "user", content: transcript }
                    ],
                    user: AppState.currentUser.username
                })
            });

            if (!response.ok) throw new Error("Failed to connect to AI backend");
            const data = await response.json();
            return data.reply;
        }

        async function generateNotes(type) {
            const transcript = AppState.finalTranscript || AppState.transcript || "No speech content.";
            if (!transcript || transcript.trim() === '') {
                showToast('No speech content to generate notes.', 'error');
                return;
            }

            document.getElementById('notesContent').innerHTML = '<div class="ai-processing-overlay"><i class="fas fa-magic fa-spin"></i> &nbsp; AI is processing your notes...</div>';
            // Scroll to notes display
            document.querySelector('.notes-display').scrollIntoView({ behavior: 'smooth' });

            let notesContent = '';
            
            try {
                if (type === 'diarize' || type === 'summary') {
                    notesContent = await processWithAI(transcript, type);
                } else {
                    notesContent = generateDetailed(transcript);
                }
            } catch (e) {
                console.error(e);
                showToast('AI processing failed. Falling back to simple notes.', 'error');
                notesContent = generateDetailed(transcript);
            }

            const title = "Lecture Notes " + new Date().toLocaleString();
            const subject = "General";
            const noteObj = {
                id: 'note_' + Date.now(),
                title: title,
                subject: subject,
                date: new Date().toISOString(),
                duration: AppState.recordingTime,
                content: notesContent
            };

            AppState.currentNotes = noteObj;
            
            // Trigger split pane layout
            document.getElementById('recordSection').classList.add('has-output');
            
            displayNotes(noteObj);
            document.getElementById('exportControls').style.display = 'flex';
            document.getElementById('downloadPdfBtn').style.display = 'inline-flex';

            // Save to user data
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username];
            user.notes = user.notes || [];
            user.notes.unshift(noteObj);
            if (user.notes.length > 20) user.notes = user.notes.slice(0,20);
            user.totalNotes = (user.totalNotes || 0) + 1;
            localStorage.setItem('userData', JSON.stringify(userData));

            loadDashboardData();
            loadRecentNotes();
            loadAllNotes();
            loadHistory();

            showToast(`${type === 'summary' ? 'Summary' : 'Detailed notes'} generated!`, 'success');
        }

        function generateSummary(text) {
            // Dummy summary generation
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const summarySentences = sentences.slice(0, Math.min(3, sentences.length));
            return `
                <div class="note-section">
                    <div class="section-header"><div class="section-icon"><i class="fas fa-align-left"></i></div><h4>Summary</h4></div>
                    <p>${summarySentences.join('. ') + '.'}</p>
                </div>
                <div class="note-section">
                    <div class="section-header"><div class="section-icon"><i class="fas fa-lightbulb"></i></div><h4>Key Points</h4></div>
                    <div class="key-points"><ul>${sentences.slice(0,3).map(s => `<li>${s}</li>`).join('')}</ul></div>
                </div>
            `;
        }

        function generateDetailed(text) {
            // Dummy detailed notes
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            return `
                <div class="note-section">
                    <div class="section-header"><div class="section-icon"><i class="fas fa-book"></i></div><h4>Full Transcription</h4></div>
                    <p>${text}</p>
                </div>
                <div class="note-section">
                    <div class="section-header"><div class="section-icon"><i class="fas fa-list"></i></div><h4>Key Concepts</h4></div>
                    <div class="key-points"><ul>${sentences.slice(0,5).map(s => `<li>${s}</li>`).join('')}</ul></div>
                </div>
                <div class="note-section">
                    <div class="section-header"><div class="section-icon"><i class="fas fa-quote-right"></i></div><h4>Important Definitions</h4></div>
                    <div class="definition"><div class="definition-term">Term 1</div><p>Definition derived from context: ${sentences[0] || '...'}</p></div>
                </div>
            `;
        }

        function displayNotes(note) {
            const container = document.getElementById('notesContent');
            container.innerHTML = `
                <div class="note-section">
                    <div class="section-header">
                        <div class="section-icon"><i class="fas fa-file-alt"></i></div>
                        <div><h4>${note.title}</h4><p class="text-sm text-gray">${note.subject} • ${new Date(note.date).toLocaleString()}</p></div>
                    </div>
                </div>
                ${note.content}
            `;
        }

        function copyNotes() {
            if (!AppState.currentNotes) { showToast('No notes to copy', 'error'); return; }
            const text = AppState.currentNotes.content.replace(/<[^>]*>/g, '');
            navigator.clipboard.writeText(text).then(() => showToast('Copied!', 'success')).catch(() => showToast('Failed to copy', 'error'));
        }

        // ============================================
        // DATA LOADING
        // ============================================
        function loadDashboardData() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username] || {};
            document.getElementById('totalRecordings').textContent = user.totalRecordings || 0;
            document.getElementById('totalNotes').textContent = user.totalNotes || 0;
            document.getElementById('totalMinutes').textContent = user.totalMinutes || 0;
            document.getElementById('storageUsed').textContent = (user.storageUsed || 0) + ' MB of 1 GB';
        }

        function loadRecentNotes() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const notes = userData[AppState.currentUser.username]?.notes || [];
            const recent = notes.slice(0,4);
            const grid = document.getElementById('recentNotesGrid');
            if (recent.length === 0) {
                grid.innerHTML = '<div class="note-card" style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-sticky-note fa-2x mb-2"></i><p>No notes yet</p></div>';
                return;
            }
            grid.innerHTML = recent.map(n => `
                <div class="note-card" onclick="viewNote('${n.id}')">
                    <div class="note-header"><span class="note-title">${n.title}</span><span class="note-date">${new Date(n.date).toLocaleDateString()}</span></div>
                    <div class="note-footer"><span class="note-tag">${n.subject}</span></div>
                </div>
            `).join('');
        }

        function loadAllNotes() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const notes = userData[AppState.currentUser.username]?.notes || [];
            const list = document.getElementById('notesList');
            if (notes.length === 0) {
                list.innerHTML = '<div class="note-card" style="grid-column:1/-1; text-align:center; padding:2rem;"><p>No notes</p></div>';
                return;
            }
            list.innerHTML = notes.map(n => `
                <div class="note-card" onclick="viewNote('${n.id}')">
                    <div class="note-header"><span class="note-title">${n.title}</span><span class="note-date">${new Date(n.date).toLocaleDateString()}</span></div>
                    <div class="note-footer">
                        <span class="note-tag">${n.subject}</span>
                        <div><button class="btn btn-icon btn-sm" onclick="event.stopPropagation(); deleteNote('${n.id}')"><i class="fas fa-trash"></i></button></div>
                    </div>
                </div>
            `).join('');
        }

        function loadHistory() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const recordings = userData[AppState.currentUser.username]?.recordings || [];
            const tbody = document.getElementById('historyTableBody');
            if (recordings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No history</td></tr>';
                return;
            }
            tbody.innerHTML = recordings.map(r => `
                <tr><td>${new Date(r.date).toLocaleDateString()}</td><td>${r.title || 'Recording'}</td><td>${Math.floor(r.duration/60)}:${(r.duration%60).toString().padStart(2,'0')}</td>
                <td>
                    <button class="btn btn-icon btn-sm" onclick="viewRecording('${r.id}')"><i class="fas fa-eye"></i></button>
                    <button class="btn btn-icon btn-sm" onclick="deleteRecording('${r.id}')"><i class="fas fa-trash text-danger"></i></button>
                </td></tr>
            `).join('');
        }

        function filterNotes(filter) {
            showToast('Filter: ' + filter, 'info');
        }

        // ============================================
        // UTILITIES
        // ============================================
        window.viewNote = function(id) {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const note = userData[AppState.currentUser.username]?.notes.find(n => n.id === id);
            if (note) {
                AppState.currentNotes = note;
                showSection('record');
                setTimeout(() => displayNotes(note), 100);
                document.getElementById('exportControls').style.display = 'flex';
            }
        };

        window.deleteNote = function(id) {
            if (!confirm('Delete note?')) return;
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username];
            user.notes = user.notes.filter(n => n.id !== id);
            user.totalNotes = (user.totalNotes || 1) - 1;
            localStorage.setItem('userData', JSON.stringify(userData));
            loadRecentNotes();
            loadAllNotes();
            loadDashboardData();
            showToast('Note deleted', 'success');
        };

        window.deleteRecording = function(id) {
            if (!confirm('Delete recording from history?')) return;
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const user = userData[AppState.currentUser.username];
            user.recordings = user.recordings.filter(r => r.id !== id);
            user.totalRecordings = Math.max(0, (user.totalRecordings || 1) - 1);
            localStorage.setItem('userData', JSON.stringify(userData));
            loadHistory();
            loadDashboardData();
            showToast('Recording deleted', 'success');
        };

        window.copyNotes = copyNotes;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas ${icons[type]}"></i></div>
                <div class="toast-content"><div class="toast-title">${type}</div><div class="toast-message">${message}</div></div>
                <button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 5000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.querySelector('#themeToggle i');
            icon.className = document.body.classList.contains('light-theme') ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Add light theme styles (same as before)
        const style = document.createElement('style');
        style.textContent = `
            .light-theme {
                --dark-1: #ffffff; --dark-2: #f8fafc; --dark-3: #e2e8f0;
                --light-1: #0f172a; --light-2: #1e293b; --light-3: #334155; --gray: #64748b;
            }
            .light-theme .sidebar { background: var(--dark-2); border-right: 1px solid var(--dark-3); }
            .light-theme .header { background: rgba(248,250,252,0.8); border-bottom: 1px solid var(--dark-3); }
            .light-theme .stat-card, .light-theme .action-card, .light-theme .recent-notes,
            .light-theme .recording-card, .light-theme .notes-display, .light-theme .settings-card,
            .light-theme .modal { background: var(--dark-2); border: 1px solid var(--dark-3); }
            .light-theme .notes-content { background: var(--dark-3); }
            .light-theme .nav-link { color: var(--light-3); }
            .light-theme .nav-link:hover { color: var(--light-1); }
            .light-theme .btn-secondary { background: rgba(0,0,0,0.05); color: var(--light-1); border:1px solid var(--dark-3); }
        `;
        document.head.appendChild(style);
    
function viewNote(id) {
    const userData = JSON.parse(localStorage.getItem('userData') || '{}');
    const user = userData[AppState.currentUser.username];
    if(!user) return;
    const note = user.notes.find(n => n.id === id);
    if(note) {
        document.getElementById('modalNoteTitle').textContent = note.title;
        document.getElementById('modalNoteMeta').textContent = note.subject + '  ' + new Date(note.date).toLocaleString();
        document.getElementById('modalNoteContent').innerHTML = note.content || '<p>No content available</p>';
        document.getElementById('noteModal').classList.add('active');
    }
}
function viewRecording(id) {
    alert("Recording view not fully implemented. Check notes.");
}
</script>
<!-- Note View Modal -->
<div class="modal" id="noteModal">
    <div class="modal-content" style="max-width:800px; width:90%; max-height:90vh; display:flex; flex-direction:column; background:var(--surface); border-radius:12px; border:1px solid var(--border); box-shadow:0 10px 30px rgba(0,0,0,0.5);">
        <div class="modal-header" style="padding:1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h2 id="modalNoteTitle" style="margin:0; font-size:1.5rem; color:var(--text-primary);">Note Title</h2>
                <p id="modalNoteMeta" style="margin:0; margin-top:0.5rem; color:var(--text-muted); font-size:0.9rem;">Date & Subject</p>
            </div>
            <button class="btn btn-icon" id="closeNoteModal" style="color:var(--text-muted);"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modalNoteContent" style="padding:1.5rem; overflow-y:auto; flex:1; color:var(--text-secondary); line-height:1.6;">
            <!-- Content goes here -->
        </div>
        <div class="modal-footer" style="padding:1.5rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:1rem;">
            <button class="btn btn-secondary" onclick="document.getElementById('noteModal').classList.remove('active')">Close</button>
            <button class="btn btn-primary" id="modalExportPdf"><i class="fas fa-file-pdf"></i> Export PDF</button>
        </div>
    </div>
</div>
  <link rel="stylesheet" href="assets/css/navigation.css">
  <script src="assets/js/navigation.js"></script>
</body>
</html>
