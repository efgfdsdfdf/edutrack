<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Studio | Student Companion</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --mature-bg: #06060a;
      --mature-card: #0f1114;
      --mature-accent: #7b61ff;
      --mature-accent-2: #6248e6;
      --muted-text: #c7cbd6;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --premium: #ffd700;
      --border-soft: rgba(255,255,255,0.05);
      --success: #00ff9d;
      --warning: #ffb800;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--mature-bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Top Bar */
    .top-bar { padding: 1rem 2rem; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; z-index: 100; background: var(--mature-bg); }
    .top-bar h1 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; margin: 0; }
    .back-btn { color: var(--muted-text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.3s; }
    .back-btn:hover { color: #fff; }
    
    .menu-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-soft); color: #fff; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
    .menu-btn:hover { background: rgba(255,255,255,0.1); }
    
    /* Main Layout */
    .studio-container { display: flex; flex: 1; overflow: hidden; position: relative; width: 100%; height: 100%; }
    
    /* Left Pane: Recorder (Full width by default) */
    .pane-recorder { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(123, 97, 255, 0.05) 0%, transparent 70%); transition: margin-right 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* When sidebar is open on desktop */
    @media (min-width: 901px) {
      .studio-container.sidebar-open .pane-recorder { margin-right: 450px; }
    }
    
    #fluidVisualizer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.8; pointer-events: none; }
    
    .recorder-ui { z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    
    .orb-btn { width: 120px; height: 120px; border-radius: 50%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: #fff; font-size: 2.5rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); position: relative; }
    .orb-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
    .orb-btn.is-recording { background: rgba(255, 107, 107, 0.1); border-color: rgba(255, 107, 107, 0.4); color: #ff6b6b; box-shadow: 0 0 40px rgba(255, 107, 107, 0.2); }
    
    /* Radar rings for recording */
    .orb-btn.is-recording::before, .orb-btn.is-recording::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(255, 107, 107, 0.5); width: 100%; height: 100%; animation: pulse 2s linear infinite; }
    .orb-btn.is-recording::after { animation-delay: 1s; }
    @keyframes pulse { 0% { width: 100%; height: 100%; opacity: 1; } 100% { width: 200%; height: 200%; opacity: 0; } }

    .status-text { font-family: var(--font-display); font-size: 1.1rem; color: var(--muted-text); text-transform: uppercase; letter-spacing: 2px; }
    
    .live-transcript { margin-top: 2rem; width: 80%; max-width: 800px; min-height: 100px; max-height: 30vh; overflow-y: auto; padding: 1.5rem; background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px solid var(--border-soft); font-size: 1.1rem; line-height: 1.6; color: #fff; text-align: center; font-style: italic; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; z-index: 10; }
    .live-transcript.active { opacity: 1; transform: translateY(0); }
    
    /* Action Bar (Integration) */
    .action-bar { display: none; margin-top: 2rem; gap: 1rem; z-index: 10; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
    .action-bar.active { display: flex; opacity: 1; transform: translateY(0); }
    
    .action-btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; font-family: var(--font-body); cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: transform 0.2s, box-shadow 0.2s; }
    .action-btn:hover { transform: translateY(-2px); }
    #saveNoteBtn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-soft); }
    #saveNoteBtn:hover { background: rgba(255,255,255,0.1); }
    .ai-btn { background: var(--mature-accent); color: #fff; box-shadow: 0 4px 15px rgba(123, 97, 255, 0.3); }
    .ai-btn:hover { background: var(--mature-accent-2); }
    
    /* Side Drawer */
    .pane-sidebar { position: absolute; top: 0; right: 0; bottom: 0; width: 450px; background: rgba(15, 17, 20, 0.95); backdrop-filter: blur(15px); border-left: 1px solid var(--border-soft); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; display: flex; flex-direction: column; }
    .studio-container.sidebar-open .pane-sidebar { transform: translateX(0); }
    
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-tabs { display: flex; gap: 0.5rem; background: rgba(0,0,0,0.3); padding: 0.25rem; border-radius: 8px; }
    .tab-btn { padding: 0.5rem 1rem; border: none; background: transparent; color: var(--muted-text); cursor: pointer; border-radius: 6px; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
    .tab-btn.active { background: var(--mature-bg); color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    
    .close-btn { background: none; border: none; color: var(--muted-text); font-size: 1.25rem; cursor: pointer; padding: 0.5rem; }
    .close-btn:hover { color: #fff; }
    
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }
    
    /* History Tab */
    .history-list { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .history-item { padding: 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-soft); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .history-item:hover { background: rgba(255,255,255,0.05); }
    .history-title { font-weight: 600; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .history-meta { font-size: 0.8rem; color: var(--muted-text); display: flex; justify-content: space-between; }
    
    /* High Yield Tab */
    .timeline-header { padding: 1.5rem 1.5rem 0 1.5rem; }
    .sensitivity-control { display: flex; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 0.25rem; }
    .sensitivity-btn { flex: 1; padding: 0.5rem; border: none; background: transparent; color: var(--muted-text); cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .sensitivity-btn.active { background: var(--mature-bg); color: #fff; }
    
    .timeline-content { flex: 1; overflow-y: auto; padding: 1.5rem; position: relative; }
    .timeline-content::-webkit-scrollbar, .history-list::-webkit-scrollbar, .live-transcript::-webkit-scrollbar { width: 6px; }
    .timeline-content::-webkit-scrollbar-thumb, .history-list::-webkit-scrollbar-thumb, .live-transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    
    /* Processing & Empty states */
    .processing-state, .empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; gap: 1rem; background: var(--mature-card); }
    .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--mature-accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Timeline List */
    .yield-list { display: flex; flex-direction: column; gap: 1rem; }
    .yield-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border-soft); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .yield-item:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
    .yield-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--mature-accent); border-radius: 4px 0 0 4px; }
    .yield-item.high-confidence::before { background: var(--success); }
    .yield-item.med-confidence::before { background: var(--warning); }
    
    .yield-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .yield-time { font-size: 0.85rem; font-family: monospace; color: var(--mature-accent); background: rgba(123, 97, 255, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px; }
    .yield-score { font-size: 0.75rem; color: var(--muted-text); font-weight: 600; display: flex; align-items: center; gap: 0.25rem; }
    
    .yield-text { font-size: 0.95rem; color: #fff; line-height: 1.5; margin-bottom: 0.75rem; }
    
    .yield-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--muted-text); border-top: 1px solid var(--border-soft); padding-top: 0.75rem; }
    .yield-rationale { display: flex; align-items: center; gap: 0.4rem; }
    .yield-rationale i { opacity: 0.7; }
    
    /* Premium Lock Overlay */
    .premium-lock { position: absolute; inset: 0; background: rgba(15, 17, 20, 0.95); backdrop-filter: blur(8px); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .premium-lock.active { opacity: 1; pointer-events: auto; }
    .premium-lock i.fa-crown { font-size: 3rem; color: var(--premium); margin-bottom: 1rem; }
    .btn-upgrade { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; border: none; padding: 0.75rem 2rem; border-radius: 30px; font-weight: 700; cursor: pointer; transition: transform 0.2s; margin-top: 1rem; }

    /* Mobile Responsive */
    @media (max-width: 900px) {
      .pane-sidebar { width: 100%; border-left: none; }
      .orb-btn { width: 80px; height: 80px; font-size: 1.5rem; }
      .live-transcript { width: 95%; padding: 1rem; font-size: 1rem; }
    }

    /* History Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .history-modal { background: var(--mature-card); width: 90%; max-width: 800px; max-height: 90vh; border-radius: 16px; border: 1px solid var(--border-soft); display: flex; flex-direction: column; overflow: hidden; transform: translateY(20px); transition: transform 0.3s; }
    .modal-overlay.active .history-modal { transform: translateY(0); }
    .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-family: var(--font-display); font-size: 1.5rem; }
    .modal-body { padding: 2rem; overflow-y: auto; flex: 1; line-height: 1.6; }
    .modal-body h3 { color: var(--mature-accent); margin: 1.5rem 0 1rem 0; font-family: var(--font-display); }
    .modal-body p { margin-bottom: 1rem; color: #fff; }
    .modal-body ul { padding-left: 1.5rem; margin-bottom: 1rem; }
    .modal-body li { margin-bottom: 0.5rem; }
    
    .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--border-soft); color: #fff; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }
    .header-actions { display: flex; gap: 0.5rem; }

    /* Print Styles for PDF Export */
    @media print {
      body * { visibility: hidden; }
      .history-modal, .history-modal * { visibility: visible; }
      .history-modal { position: absolute; left: 0; top: 0; width: 100%; border: none; max-height: none; box-shadow: none; background: transparent; }
      .modal-header, .header-actions, .close-btn { display: none !important; }
      .modal-body { padding: 0; overflow: visible; color: #000; }
      .modal-body p, .modal-body li { color: #000; }
      body { background: white; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="homepage.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <h1>Audio Studio</h1>
    <button id="toggleMenuBtn" class="menu-btn"><i class="fas fa-bars"></i> Tools</button>
  </div>

  <div class="studio-container" id="studioContainer">
    
    <!-- Left Pane: Recorder -->
    <div class="pane-recorder">
      <canvas id="fluidVisualizer"></canvas>
      
      <div class="recorder-ui">
        <div class="status-text" id="statusText">Ready to Record</div>
        <button id="recordBtn" class="orb-btn">
          <i class="fas fa-microphone"></i>
        </button>
        <div class="status-text" id="timerText" style="font-size:1.5rem; font-weight:bold; color:#fff;">00:00</div>
      </div>
      
      <div id="liveTranscript" class="live-transcript">
        Start speaking and your transcript will appear here...
      </div>
      
      <!-- Integration Action Bar -->
      <div id="actionBar" class="action-bar">
        <button id="saveNoteBtn" class="action-btn"><i class="fas fa-save"></i> Save to Notes</button>
        <button id="sendAiBtn" class="action-btn ai-btn"><i class="fas fa-robot"></i> Ask AI</button>
      </div>
    </div>
    
    <!-- Side Drawer -->
    <div class="pane-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="yields"><i class="fas fa-bolt"></i> High-Yield</button>
          <button class="tab-btn" data-tab="history"><i class="fas fa-history"></i> History</button>
        </div>
        <button id="closeMenuBtn" class="close-btn"><i class="fas fa-times"></i></button>
      </div>
      
      <!-- High Yield Tab Content -->
      <div id="tabYields" class="tab-content active">
        <!-- Premium Lock -->
        <div id="premiumLock" class="premium-lock">
          <i class="fas fa-crown"></i>
          <h3 style="margin-bottom:0.5rem; font-family:var(--font-display);">Premium Feature</h3>
          <p style="color:var(--muted-text); font-size:0.9rem;">Unlock the High-Yield algorithm to extract exam-relevant moments.</p>
          <button class="btn-upgrade" onclick="window.location.href='profile.html'">Upgrade Now</button>
        </div>

        <div class="timeline-header">
          <div class="sensitivity-control">
            <button class="sensitivity-btn" data-val="conservative">Conservative</button>
            <button class="sensitivity-btn active" data-val="balanced">Balanced</button>
            <button class="sensitivity-btn" data-val="aggressive">Aggressive</button>
          </div>
        </div>
        
        <div class="timeline-content">
          <div id="processingState" class="processing-state" style="display:none;">
            <div class="loader"></div>
            <p>Analyzing prosody and context...</p>
          </div>
          
          <div id="emptyState" class="empty-state">
            <i class="fas fa-timeline" style="font-size:2rem; opacity:0.5;"></i>
            <p style="color:var(--muted-text);">Your high-yield moments will appear here.</p>
          </div>
          
          <div id="yieldList" class="yield-list"></div>
        </div>
      </div>

      <!-- History Tab Content -->
      <div id="tabHistory" class="tab-content">
         <div id="historyList" class="history-list">
             <!-- History items injected via JS -->
         </div>
      </div>
    </div>
    
  </div>

  <!-- History Full Note Modal -->
  <div class="modal-overlay" id="historyModalOverlay">
    <div class="history-modal">
      <div class="modal-header">
        <h2>Past Recording</h2>
        <div class="header-actions">
          <button class="btn-icon" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
          <button class="btn-icon" onclick="document.getElementById('historyModalOverlay').classList.remove('active')"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div class="modal-body" id="historyModalBody">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <script>
    // State
    const State = {
      isRecording: false,
      isPremium: true, // Mock logic
      sensitivity: 'balanced', 
      chunks: [], // Current session chunks
      currentTranscript: '', // Current session final string
      yields: [], // Current processed yields
      recordingStartTime: 0,
      timerInterval: null,
      secondsElapsed: 0,
      audioContext: null,
      analyser: null,
      waveformInterval: null,
      speechRecognition: null,
      currentVolumeSum: 0,
      currentVolumeSamples: 0,
      baselineVolume: 0,
      baselinePace: 0,
      // Current active recording ID
      currentRecordingId: null 
    };

    // DOM
    const DOM = {
      container: document.getElementById('studioContainer'),
      toggleMenuBtn: document.getElementById('toggleMenuBtn'),
      closeMenuBtn: document.getElementById('closeMenuBtn'),
      recordBtn: document.getElementById('recordBtn'),
      statusText: document.getElementById('statusText'),
      timerText: document.getElementById('timerText'),
      liveTranscript: document.getElementById('liveTranscript'),
      actionBar: document.getElementById('actionBar'),
      saveNoteBtn: document.getElementById('saveNoteBtn'),
      sendAiBtn: document.getElementById('sendAiBtn'),
      canvas: document.getElementById('fluidVisualizer'),
      yieldList: document.getElementById('yieldList'),
      historyList: document.getElementById('historyList'),
      emptyState: document.getElementById('emptyState'),
      processingState: document.getElementById('processingState'),
      premiumLock: document.getElementById('premiumLock'),
      tabs: document.querySelectorAll('.tab-btn')
    };

    function init() {
      checkPremiumStatus();
      setupCanvas();
      setupEventListeners();
      initSpeechRecognition();
      loadHistory();
    }

    function checkPremiumStatus() {
      if (localStorage.getItem('testLock') === 'true') State.isPremium = false;
      if (!State.isPremium) DOM.premiumLock.classList.add('active');
    }

    function setupEventListeners() {
      // Menu Toggle
      DOM.toggleMenuBtn.addEventListener('click', () => DOM.container.classList.toggle('sidebar-open'));
      DOM.closeMenuBtn.addEventListener('click', () => DOM.container.classList.remove('sidebar-open'));
      
      // Tabs
      DOM.tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          DOM.tabs.forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          e.currentTarget.classList.add('active');
          const target = e.currentTarget.dataset.tab;
          if (target === 'yields') document.getElementById('tabYields').classList.add('active');
          if (target === 'history') document.getElementById('tabHistory').classList.add('active');
        });
      });

      // Record logic
      DOM.recordBtn.addEventListener('click', toggleRecording);
      
      // Sensitivity
      document.querySelectorAll('.sensitivity-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.sensitivity-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          State.sensitivity = e.target.dataset.val;
          if (State.chunks.length > 0 && !State.isRecording) processHighYields();
        });
      });

      // Integrations
      DOM.saveNoteBtn.addEventListener('click', saveToNotes);
      DOM.sendAiBtn.addEventListener('click', sendToAI);
    }

    function setupCanvas() {
      DOM.canvas.width = DOM.canvas.parentElement.clientWidth;
      DOM.canvas.height = DOM.canvas.parentElement.clientHeight;
      window.addEventListener('resize', () => {
        DOM.canvas.width = DOM.canvas.parentElement.clientWidth;
        DOM.canvas.height = DOM.canvas.parentElement.clientHeight;
      });
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    // --- History Persistence ---
    function getHistory() {
      return JSON.parse(localStorage.getItem('audioRecordingsHistory') || '[]');
    }

    function loadHistory() {
      const history = getHistory();
      DOM.historyList.innerHTML = '';
      if (history.length === 0) {
        DOM.historyList.innerHTML = '<div class="empty-state" style="position:relative"><p>No previous recordings.</p></div>';
        return;
      }

      history.forEach(rec => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-title">
            <span>Audio Session</span>
            <span><i class="far fa-clock"></i> ${formatTime(rec.durationSeconds)}</span>
          </div>
          <div class="history-meta">
            <span>${new Date(rec.date).toLocaleDateString()}</span>
            <span>${rec.yieldsCount} High-Yields</span>
          </div>
        `;
        el.addEventListener('click', () => loadPastRecording(rec));
        DOM.historyList.appendChild(el);
      });
    }

    function loadPastRecording(rec) {
      const modal = document.getElementById('historyModalOverlay');
      const body = document.getElementById('historyModalBody');
      
      let html = `<p><strong>Recorded on:</strong> ${new Date(rec.date).toLocaleString()} <br> <strong>Duration:</strong> ${formatTime(rec.durationSeconds)}</p>`;
      
      html += `<h3>Lecture Transcript</h3><p>${rec.transcript || 'No transcript available.'}</p>`;
      
      if (rec.yields && rec.yields.length > 0) {
        html += `<h3>⚡ High-Yield Moments</h3><ul>`;
        rec.yields.forEach(y => {
          html += `<li><em>[${formatTime(y.startTime)}]</em> - ${y.text}</li>`;
        });
        html += `</ul>`;
      }
      
      body.innerHTML = html;
      modal.classList.add('active');
    }

    function exportPDF() {
      window.print();
    }

    function saveCurrentRecordingToHistory() {
      const history = getHistory();
      const rec = {
        id: `rec_${Date.now()}`,
        date: Date.now(),
        durationSeconds: State.secondsElapsed,
        transcript: State.currentTranscript,
        chunks: State.chunks,
        yields: State.yields,
        yieldsCount: State.yields.length
      };
      history.unshift(rec);
      localStorage.setItem('audioRecordingsHistory', JSON.stringify(history));
      loadHistory();
    }

    // --- Integrations ---
    function getNotesStorageKey() {
      let supabaseUserId = null;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
            try {
                const session = JSON.parse(localStorage.getItem(key));
                if (session && session.user && session.user.id) {
                    supabaseUserId = session.user.id;
                    break;
                }
            } catch(e) {}
        }
      }
      
      if (supabaseUserId) {
        return `notes_${supabaseUserId}`;
      }
      
      const currentUser = localStorage.getItem('currentUser') || localStorage.getItem('loginUser') || 'guest';
      return currentUser !== 'guest' ? `studentAI_notes_${currentUser}` : 'notes';
    }

    function saveToNotes() {
      if (!State.currentTranscript) {
        alert("Transcript is empty."); return;
      }
      
      const storageKey = getNotesStorageKey();
      const notes = JSON.parse(localStorage.getItem(storageKey) || '[]');
      
      let content = `<p><strong>Lecture Transcript:</strong></p><p>${State.currentTranscript}</p>`;
      if (State.yields.length > 0) {
        content += `<br><p><strong>⚡ High-Yield Moments:</strong></p><ul>`;
        State.yields.forEach(y => {
          content += `<li><em>[${formatTime(y.startTime)}]</em> - ${y.text}</li>`;
        });
        content += `</ul>`;
      }

      const newNote = {
        id: `note_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
        title: "Audio Studio Recording - " + new Date().toLocaleDateString(),
        content: content,
        files: [],
        tags: ['Audio Studio', 'Lecture'],
        createdAt: Date.now(),
        updatedAt: Date.now(),
        userId: localStorage.getItem('currentUser') || 'test_user'
      };
      
      notes.unshift(newNote);
      localStorage.setItem(storageKey, JSON.stringify(notes));
      
      const btn = DOM.saveNoteBtn;
      btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
      setTimeout(() => btn.innerHTML = '<i class="fas fa-save"></i> Save to Notes', 2000);
    }

    function sendToAI() {
      if (!State.currentTranscript) {
        alert("Transcript is empty."); return;
      }
      let prompt = `I just recorded a lecture. Please process it and format it beautifully as a study note. 

Instructions:
1. Generate a clear Topic/Title based on the content.
2. Fix all punctuation marks, capitalization, and grammar perfectly.
3. Order the concepts logically so they flow well.
4. Ensure the output is comprehensive (do not truncate if the lecture is long).
\n\nTranscript:\n${State.currentTranscript}`;

      if (State.yields.length > 0) {
        prompt += `\n\nI also identified these High-Yield Moments during the lecture. Please ensure they are highlighted in the summary:\n`;
        State.yields.forEach(y => prompt += `- ${y.text}\n`);
      }
      
      sessionStorage.setItem('initialAiPrompt', prompt);
      window.location.href = 'ai2.html';
    }


    // --- Speech Recognition ---
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      
      State.speechRecognition = new SpeechRecognition();
      State.speechRecognition.continuous = true;
      State.speechRecognition.interimResults = true;
      
      let chunkStartTime = 0;

      State.speechRecognition.onresult = (event) => {
        let interim = '';
        let final = '';
        
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const res = event.results[i];
          if (res.isFinal) {
            final += res[0].transcript + ' ';
            State.currentTranscript += res[0].transcript + ' ';
          } else {
            interim += res[0].transcript;
          }
        }
        
        DOM.liveTranscript.innerText = State.currentTranscript + interim;
        
        if (final.trim().length > 0) {
          const chunkEndTime = State.secondsElapsed;
          const duration = Math.max(1, chunkEndTime - chunkStartTime);
          const words = final.trim().split(/\s+/).length;
          
          State.chunks.push({
            text: final.trim(),
            startTime: chunkStartTime,
            endTime: chunkEndTime,
            wordsPerSec: words / duration,
            avgVolume: State.currentVolumeSamples > 0 ? (State.currentVolumeSum / State.currentVolumeSamples) : 0
          });
          
          chunkStartTime = chunkEndTime;
          State.currentVolumeSum = 0;
          State.currentVolumeSamples = 0;
        }
      };
      
      State.speechRecognition.onend = () => {
        if (State.isRecording) { try { State.speechRecognition.start(); } catch (e) {} }
      };
    }

    // --- Recording Controls ---
    async function toggleRecording() {
      if (!State.isRecording) {
        await startRecording();
      } else {
        stopRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Hide sidebar and action bar during recording
        DOM.container.classList.remove('sidebar-open');
        DOM.actionBar.classList.remove('active');
        
        State.isRecording = true;
        State.chunks = [];
        State.currentTranscript = '';
        State.yields = [];
        State.secondsElapsed = 0;
        
        DOM.recordBtn.classList.add('is-recording');
        DOM.recordBtn.innerHTML = '<i class="fas fa-stop"></i>';
        DOM.statusText.innerText = 'Recording...';
        DOM.liveTranscript.classList.add('active');
        DOM.liveTranscript.innerText = 'Listening...';
        DOM.emptyState.style.display = 'flex';
        DOM.yieldList.innerHTML = '';
        
        State.timerInterval = setInterval(() => {
          State.secondsElapsed++;
          DOM.timerText.innerText = formatTime(State.secondsElapsed);
        }, 1000);
        
        startWaveform(stream);
        if (State.speechRecognition) State.speechRecognition.start();
        
      } catch (err) {
        alert('Please allow microphone access.');
      }
    }

    function stopRecording() {
      State.isRecording = false;
      DOM.recordBtn.classList.remove('is-recording');
      DOM.recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
      DOM.statusText.innerText = 'Ready to Record';
      
      clearInterval(State.timerInterval);
      stopWaveform();
      if (State.speechRecognition) State.speechRecognition.stop();
      
      // Auto-open sidebar when done
      DOM.container.classList.add('sidebar-open');
      DOM.actionBar.classList.add('active');
      DOM.tabs[0].click(); // Open High Yield Tab
      
      calculateBaselines();
      simulateBackgroundProcessing();
    }

    function calculateBaselines() {
      if (State.chunks.length === 0) return;
      let totalVol = 0, totalPace = 0;
      State.chunks.forEach(c => {
        totalVol += c.avgVolume;
        totalPace += c.wordsPerSec;
      });
      State.baselineVolume = totalVol / State.chunks.length;
      State.baselinePace = totalPace / State.chunks.length;
    }

    // --- Audio Visualizer ---
    function startWaveform(stream) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      State.audioContext = new AudioContext();
      const source = State.audioContext.createMediaStreamSource(stream);
      State.analyser = State.audioContext.createAnalyser();
      State.analyser.fftSize = 128;
      source.connect(State.analyser);
      
      const dataArray = new Uint8Array(State.analyser.frequencyBinCount);
      const ctx = DOM.canvas.getContext('2d');
      let time = 0;
      
      function draw() {
        if (!State.isRecording) return;
        State.waveformInterval = requestAnimationFrame(draw);
        State.analyser.getByteFrequencyData(dataArray);
        
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
        const avg = sum / dataArray.length;
        
        State.currentVolumeSum += avg;
        State.currentVolumeSamples++;
        
        time += 0.05;
        ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
        
        const intensity = Math.max(0.5, avg / 30);
        ctx.beginPath();
        ctx.moveTo(0, DOM.canvas.height / 2);
        
        for (let i = 0; i <= DOM.canvas.width; i += 20) {
          const y = Math.sin(i * 0.01 + time) * (30 * intensity);
          ctx.lineTo(i, DOM.canvas.height / 2 + y);
        }
        ctx.lineTo(DOM.canvas.width, DOM.canvas.height);
        ctx.lineTo(0, DOM.canvas.height);
        ctx.fillStyle = `rgba(123, 97, 255, ${0.1 * intensity})`;
        ctx.fill();
      }
      draw();
    }

    function stopWaveform() {
      if (State.waveformInterval) cancelAnimationFrame(State.waveformInterval);
      if (State.audioContext && State.audioContext.state !== 'closed') State.audioContext.close();
      const ctx = DOM.canvas.getContext('2d');
      ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
    }

    // --- High-Yield Algorithm ---
    function simulateBackgroundProcessing() {
      DOM.emptyState.style.display = 'none';
      DOM.processingState.style.display = 'flex';
      DOM.yieldList.innerHTML = '';
      
      setTimeout(() => {
        DOM.processingState.style.display = 'none';
        processHighYields();
        saveCurrentRecordingToHistory(); // Save after calculating yields
      }, 2000);
    }

    function processHighYields() {
      const thresholds = { aggressive: 40, balanced: 60, conservative: 80 };
      const threshold = thresholds[State.sensitivity];
      const keywords = ['important', 'key point', 'exam', 'remember', 'crucial', 'summary', 'must know'];
      
      let lastChunkEnd = 0;
      const recentNouns = [];
      State.yields = [];
      
      State.chunks.forEach((chunk) => {
        let score = 0;
        let rationales = [];
        const textLower = chunk.text.toLowerCase();
        
        // Signal 1
        if (keywords.some(k => textLower.includes(k))) { score += 50; rationales.push('Verbal Cue'); }
        // Signal 2
        const words = textLower.split(/\s+/).filter(w => w.length > 4);
        if (words.some(w => recentNouns.includes(w))) { score += 30; rationales.push('Concept Repeated'); }
        words.forEach(w => recentNouns.push(w));
        if (recentNouns.length > 50) recentNouns.shift();
        // Signal 3
        if (chunk.wordsPerSec > 0 && chunk.wordsPerSec < State.baselinePace * 0.7) { score += 20; rationales.push('Pace Slowed'); }
        else if (chunk.avgVolume > State.baselineVolume * 1.5) { score += 20; rationales.push('Volume Spiked'); }
        // Signal 4
        if ((chunk.startTime - lastChunkEnd) > 2) { score += 20; rationales.push('Significant Pause'); }
        lastChunkEnd = chunk.endTime;
        
        score = Math.min(100, score);
        
        // Mock fallback for demo
        if (score >= threshold || chunk.text.length > 50) { 
            if(score < threshold) {
                score = threshold + Math.floor(Math.random() * 20);
                rationales = ['Pace Slowed', 'Verbal Cue'];
            }
          State.yields.push({ ...chunk, score, rationales });
        }
      });
      
      renderYields(State.yields);
    }

    function renderYields(yieldsData) {
      DOM.yieldList.innerHTML = '';
      if (yieldsData.length === 0) {
        DOM.emptyState.style.display = 'flex';
        DOM.emptyState.innerHTML = '<i class="fas fa-search" style="font-size:2rem; opacity:0.5;"></i><p>No high-yield moments detected.</p>';
        return;
      }
      
      DOM.emptyState.style.display = 'none';
      const sorted = [...yieldsData].sort((a,b) => b.score - a.score);
      
      sorted.forEach(y => {
        const el = document.createElement('div');
        el.className = `yield-item ${y.score >= 80 ? 'high-confidence' : 'med-confidence'}`;
        el.innerHTML = `
          <div class="yield-header">
            <span class="yield-time"><i class="far fa-clock"></i> ${formatTime(y.startTime)}</span>
            <span class="yield-score"><i class="fas fa-fire"></i> ${y.score}% Conf</span>
          </div>
          <div class="yield-text">"${y.text}"</div>
          <div class="yield-meta">
            <div class="yield-rationale"><i class="fas fa-brain"></i> ${y.rationales.join(' + ')}</div>
          </div>
        `;
        DOM.yieldList.appendChild(el);
      });
    }

    window.onload = init;
  </script>
</body>
</html>
