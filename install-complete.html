<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Installing ACE</title>
  <meta name="theme-color" content="#000000">
  <style>
    :root {
      --bg: #06060a;
      --card: #101018;
      --accent: #7b61ff;
      --text: #f5f5fb;
      --muted: #b6b8c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(123, 97, 255, 0.18), transparent 36%),
        radial-gradient(circle at 80% 70%, rgba(76, 242, 194, 0.1), transparent 32%),
        var(--bg);
      color: var(--text);
      text-align: center;
    }

    main {
      width: min(100%, 520px);
      padding: 36px 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(16, 16, 24, 0.82);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .mark {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent), #4cf2c2);
      color: #fff;
      font-size: 34px;
      font-weight: 800;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
<script src="assets/js/custom-modals.js"></script>
</head>
<body>
  <main>
    <div class="mark">A</div>
    <h1>Wait and check your homescreen for ACE</h1>
    <p>The install is finishing. Once ACE appears on your homescreen, open it from there.</p>
  </main>
</body>
</html>
