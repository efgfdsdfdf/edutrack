<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline | Ace</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/ace-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --text: #e2e8f0;
      --primary: #00ff9d;
      --danger: #ff4757;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .icon-container {
      font-size: 4rem;
      color: var(--danger);
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }
    p {
      color: #94a3b8;
      max-width: 400px;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--bg);
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn:hover {
      opacity: 0.8;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="icon-container">
    <i class="fas fa-wifi-slash"></i>
  </div>
  
  <h1>You are offline</h1>
  <p>It looks like you've lost your internet connection. Don't worry, you can still access your locally cached study tools.</p>
  
  <div class="actions">
    <a href="javascript:location.reload()" class="btn btn-primary">
      <i class="fas fa-sync"></i> Try Again
    </a>
    <a href="homepage.html" class="btn btn-secondary">
      <i class="fas fa-home"></i> Go Home
    </a>
    <a href="notes.html" class="btn btn-secondary">
      <i class="fas fa-sticky-note"></i> View Notes
    </a>
  </div>

</body>
</html>
