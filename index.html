<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download ACE Student Companion</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7b61ff" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }
    // Reload when new SW activates
    if (navigator.serviceWorker) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    :root {
      --cyber-purple: #7b61ff;
      --cyber-purple-light: #9d88ff;
      --cyber-purple-dark: #4b36b2;
      --bg-dark: #07070a;
      --text-main: #f0f0f5;
      --text-muted: #a0a0b8;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-main); overflow-x:hidden; line-height:1.5; }
    .ambient-glow {
      position:fixed; inset:0; pointer-events:none; z-index:-1;
      background: radial-gradient(circle at 15% 30%, rgba(123,97,255,0.08) 0%, transparent 40%),
                  radial-gradient(circle at 85% 70%, rgba(157,136,255,0.05) 0%, transparent 40%);
    }
    .container { max-width:900px; margin:auto; padding:0 1.5rem; }
    header { display:flex; align-items:center; font-size:1.3rem; font-weight:800; color:#fff; margin:1.5rem 0; }
    header i { color:var(--cyber-purple); margin-right:8px; }
    .hero { text-align:center; padding:2rem 0 3rem; }
    .hero h1 { font-size:3rem; font-weight:800; background:linear-gradient(135deg,#fff,var(--cyber-purple-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:1rem; }
    .hero p { font-size:1.1rem; color:var(--text-muted); max-width:600px; margin:0 auto 2rem; }
    .download-btn { display:inline-flex; align-items:center; gap:10px; background:linear-gradient(135deg,var(--cyber-purple),var(--cyber-purple-dark)); color:#fff; padding:1rem 2.5rem; font-size:1.1rem; font-weight:600; border-radius:50px; transition:all .3s ease; box-shadow:0 10px 30px rgba(123,97,255,.3); text-decoration:none; }
    .download-btn:hover { transform:translateY(-2px); box-shadow:0 15px 40px rgba(123,97,255,.5); background:linear-gradient(135deg,var(--cyber-purple-light),var(--cyber-purple)); }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>
  <div class="container">
    <header><i class="fas fa-graduation-cap"></i> ACE Companion</header>
    <div class="hero">
      <h1>Master Your Studies.<br>Powered by AI.</h1>
      <p>The ultimate set of tools designed to track your GPA, manage your time, and provide intelligent 24/7 assistance.</p>
      <button id="installBtn" class="download-btn" style="display:none;"><i class="fab fa-android"></i> Install App</button>
      <div id="unsupportedMsg" style="color:#f88; margin-top:10px; display:none;">Installation is not supported on this browser.</div>
    </div>
  </div>
  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    const unsupportedMsg = document.getElementById('unsupportedMsg');
    function updateInstallUI() {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      if (isStandalone) {
        window.location.href = 'login.html';
        return;
      }
      if (deferredPrompt) {
        installBtn.style.display = 'inline-flex';
        unsupportedMsg.style.display = 'none';
      } else {
        installBtn.style.display = 'none';
        if (!('onbeforeinstallprompt' in window)) unsupportedMsg.style.display = 'block';
      }
    }
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; updateInstallUI(); });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      updateInstallUI();
      if (outcome === 'accepted') setTimeout(() => { window.location.href = 'login.html'; }, 1000);
    });
    window.addEventListener('load', updateInstallUI);
  </script>
</body>
</html>
