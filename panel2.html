<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Code Black Admin Console</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
  <script src="assets/js/notifications.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <style>
    /* ===== MODERN CYBERPUNK GLASSMORPHISM THEME (ADMIN CONSOLE) ===== */
    :root {
      --primary-color: #7b61ff;
      --primary-dark: #6749ff;
      --primary-light: #9d8aff;
      --secondary-color: #00ffcc;
      --accent-color: #ff00ff;
      --background-dark: #0f0f2f;
      --background-darker: #06060a;
      --card-bg: rgba(30, 30, 46, 0.7);
      --card-border: rgba(123, 97, 255, 0.2);
      --text-light: #ffffff;
      --text-muted: #bbbbbb;
      --text-gray: #888888;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --gradient: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      --error-color: #ff6b6b;
      --success-color: #00ffcc;
      --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      
      /* Legacy compatibility for admin logic */
      --bg: var(--background-darker);
      --panel: var(--card-bg);
      --panel-2: rgba(255, 255, 255, 0.05);
      --line: var(--card-border);
      --text: var(--text-light);
      --muted: var(--text-muted);
      --accent: var(--secondary-color);
      --danger: var(--error-color);
      --warn: #f2b036;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, var(--background-darker), var(--background-dark));
      color: var(--text-light);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-elements {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-element {
      position: absolute;
      border-radius: 50%;
      background: rgba(123, 97, 255, 0.08);
      animation: float 20s infinite linear;
    }

    .bg-element:nth-child(1) { width: 400px; height: 400px; top: -10%; left: -5%; animation-delay: 0s; }
    .bg-element:nth-child(2) { width: 300px; height: 300px; bottom: -5%; right: -5%; animation-delay: -5s; }
    .bg-element:nth-child(3) { width: 200px; height: 200px; top: 40%; left: 15%; animation-delay: -10s; background: rgba(0, 255, 204, 0.05); }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
      33% { transform: translate(30px, 50px) rotate(120deg); opacity: 0.8; }
      66% { transform: translate(-20px, 20px) rotate(240deg); opacity: 0.6; }
      100% { transform: translate(0, 0) rotate(360deg); opacity: 0.5; }
    }

    .hidden { display: none !important; }

    /* Login View */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 40px;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--gradient);
    }

    .login-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-sub {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .field { margin-bottom: 24px; }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: var(--transition);
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      background: rgba(123, 97, 255, 0.08);
    }

    textarea {
      min-height: 180px;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 0.9rem;
    }

    .row { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      background: var(--gradient);
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(123, 97, 255, 0.3);
      filter: brightness(1.1);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    button.warn { background: var(--warn); color: #000; }
    button.danger { background: var(--danger); color: #fff; }

    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
    }

    /* App Layout */
    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: rgba(6, 6, 10, 0.4);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-right: 1px solid var(--card-border);
      padding: 32px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .small { color: var(--text-muted); font-size: 0.8rem; }

    .table-list {
      margin-top: 32px;
      display: grid;
      gap: 8px;
    }

    .table-btn {
      width: 100%;
      text-align: left;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 600;
      transition: var(--transition);
      cursor: pointer;
    }

    .table-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .table-btn.active {
      background: rgba(123, 97, 255, 0.15);
      border-color: var(--primary-color);
      color: var(--primary-light);
      box-shadow: 0 0 15px rgba(123, 97, 255, 0.1);
    }

    .main { padding: 32px; overflow-x: auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 32px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .metric {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
    }

    .metric .k { color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    .metric .v { font-size: 1.8rem; font-weight: 800; color: #fff; margin-top: 8px; }

    .panel {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 60vh;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9rem;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: rgba(255, 255, 255, 0.02); }

    .pill {
      display: inline-flex;
      padding: 4px 12px;
      border-radius: 100px;
      background: rgba(123, 97, 255, 0.1);
      border: 1px solid rgba(123, 97, 255, 0.2);
      font-size: 0.75rem;
      color: var(--primary-light);
      font-weight: 700;
    }

    .btn-icon {
      padding: 6px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2000;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px;
      animation: modalFadeUp 0.4s ease;
    }

    @keyframes modalFadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Dashboard Specific Styles */
    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 16px 0;
    }
    .user-card {
      background: rgba(30, 30, 46, 0.7);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .user-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      border-color: var(--primary-light);
    }
    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
      object-fit: cover;
      border: 2px solid var(--card-border);
      box-shadow: 0 8px 16px rgba(123, 97, 255, 0.2);
    }
    .user-name { font-size: 1.25rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .user-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; font-weight: 500; }
    .user-badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .user-actions { display: flex; gap: 8px; width: 100%; margin-top: auto; }
    .user-actions button { flex: 1; justify-content: center; font-size: 0.85rem; padding: 10px; border-radius: 10px; }
    
    .activity-feed { display: flex; flex-direction: column; gap: 12px; padding: 16px 0; }
    .activity-item { display: flex; gap: 16px; background: rgba(30, 30, 46, 0.6); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; align-items: center; backdrop-filter: blur(10px); transition: var(--transition); }
    .activity-item:hover { background: rgba(30, 30, 46, 0.8); border-color: rgba(255, 255, 255, 0.1); }
    .activity-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(123, 97, 255, 0.1); color: var(--primary-light); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; flex-shrink: 0; }
    .activity-content { flex: 1; }
    .activity-title { font-weight: 600; color: #fff; font-size: 0.95rem; }
    .activity-title b { color: var(--secondary-color); }
    .activity-time { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    
    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--card-border); }
    }
  </style>
</head>
<body>
  <!-- Animated Background Elements -->
  <div class="bg-elements">
    <div class="bg-element"></div>
    <div class="bg-element"></div>
    <div class="bg-element"></div>
  </div>
  <section id="loginView" class="login-wrap">
    <div class="card">
      <h1 class="login-title">Admin Control Center</h1>
      <p class="login-sub">This panel controls all major project tables through secure backend admin APIs.</p>

      <!-- Supabase Auth Login -->
      <div class="field">
        <label class="label" for="adminEmail">Email Address</label>
        <input id="adminEmail" type="email" placeholder="admin@firstcodeblack.com" />
      </div>
      <div class="field">
        <label class="label" for="adminPassword">Password</label>
        <input id="adminPassword" type="password" placeholder="Enter password" />
      </div>

      <div class="row">
        <button id="connectBtn">Login</button>
      </div>

      <div class="status" id="loginStatus">Waiting for connection details.</div>
    </div>
  </section>

  <section id="appView" class="app hidden">
    <aside class="sidebar">
      <div class="brand">First Code Black</div>
      <div class="small">Admin Console</div>
      <div class="small" id="connectedTo">Not connected</div>

      <div style="margin-top: 10px" class="row">
        <button class="secondary" id="reloadSchemaBtn">Reload Schema</button>
        <button class="secondary" id="logoutBtn">Logout</button>
      </div>

      <div style="margin-top: 12px" class="pill" id="tableCountPill">0 tables</div>

      <div class="table-list" id="tableList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
  <span class="topbar-greeting" id="greetingSpan" style="margin-right:auto;color:#fff;font-size:1.1rem;">Welcome</span>
  <div class="row">
    <button class="secondary" id="refreshMetricsBtn">Refresh Metrics</button>
    <button class="secondary" id="refreshRowsBtn">Refresh Rows</button>
    <button id="addRowBtn">Add Row</button>
    <button class="secondary" id="calcBtn" style="margin-left:12px;">Calculator</button>
  </div>
</div>

      <section class="metrics" id="metricsGrid"></section>



      <section class="panel">
        <div class="panel-head" style="align-items: flex-end;">
          <div>
            <h3>Table Data</h3>
            <div class="small" id="rowSummary">No data loaded.</div>
          </div>
          <div class="row">
            <input type="text" id="tableSearch" placeholder="Search in table..." style="background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; width: 250px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); color: #fff;" />
          </div>
        </div>
        <div class="table-wrap" id="tableWrap">
          <table id="standardTable">
            <thead>
              <tr id="tableHeaderRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="customView" style="display: none;"></div>
        </div>
      </section>

      <div class="status" id="appStatus" style="margin-top: 12px;">Ready.</div>
    </main>
  </section>

  <div id="rowModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <h3 id="modalTitle">Edit</h3>
        <button class="secondary btn-icon" id="closeModalBtn" style="width: 32px; height: 32px; padding: 0;"><i class="fas fa-times"></i></button>
      </div>
      <p class="small" id="modalHint" style="margin-bottom: 24px; color: var(--text-muted);">Provide valid data.</p>
      
      <!-- Custom User Form -->
      <div id="userFormContainer" style="display: none; flex-direction: column; gap: 16px;">
        <div class="row">
          <div class="field" style="flex: 1; margin: 0;">
            <label class="label">First Name</label>
            <input id="u_first_name" type="text" placeholder="John" />
          </div>
          <div class="field" style="flex: 1; margin: 0;">
            <label class="label">Last Name</label>
            <input id="u_last_name" type="text" placeholder="Doe" />
          </div>
        </div>
        <div class="field" style="margin: 0;">
          <label class="label">Username</label>
          <input id="u_username" type="text" placeholder="johndoe123" />
        </div>
        <div class="row">
          <div class="field" style="flex: 1; margin: 0;">
            <label class="label">Role</label>
            <select id="u_role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="field" style="flex: 1; margin: 0;">
            <label class="label">Status</label>
            <select id="u_status">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="suspended">Suspended</option>
              <option value="blocked">Blocked</option>
              <option value="pending">Pending</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Raw JSON Form -->
      <div class="field" id="jsonFormContainer">
        <textarea id="rowEditor"></textarea>
      </div>

      <div class="row" style="margin-top: 24px;">
        <button id="saveRowBtn"><i class="fas fa-save" style="margin-right: 6px;"></i> Save Changes</button>
        <button class="secondary" id="formatJsonBtn">Format JSON</button>
      </div>
      <div class="status" id="modalStatus" style="margin-top: 16px;">Make changes and save.</div>
    </div>
  </div>

  <script>
    const state = {
      supabase: null,
      adminEmail: '',
      tables: {
        'profiles': { primaryKey: 'id', readOnly: false },
        'activity_logs': { primaryKey: 'id', readOnly: true }
      },
      schema: {
        database: {
          tables: {
            'profiles': { primaryKey: 'id', readOnly: false },
            'activity_logs': { primaryKey: 'id', readOnly: true }
          }
        }
      },
      metrics: null,
      activeTable: 'profiles',
      activeRows: [],
      activeTotal: 0,
      modalMode: 'create',
  currentUser: null,
      modalRowId: null,
      searchQuery: '',
      sortColumn: null,
      sortDesc: false
    };

    const loginView = document.getElementById('loginView');
    const appView = document.getElementById('appView');
    const adminEmailInput = document.getElementById('adminEmail');
    const adminPasswordInput = document.getElementById('adminPassword');
    const tableSearchInput = document.getElementById('tableSearch');
    const loginStatus = document.getElementById('loginStatus');

    const connectedTo = document.getElementById('connectedTo');
    const tableList = document.getElementById('tableList');
    const tableCountPill = document.getElementById('tableCountPill');
    const activeTableTitle = document.getElementById('activeTableTitle');
    const activeTableMeta = document.getElementById('activeTableMeta');
    const metricsGrid = document.getElementById('metricsGrid');
    const schemaPreview = document.getElementById('schemaPreview');
    const standardTable = document.getElementById('standardTable');
    const customView = document.getElementById('customView');
    const tableHeaderRow = document.getElementById('tableHeaderRow');
    const tableBody = document.getElementById('tableBody');
    const rowSummary = document.getElementById('rowSummary');
    const appStatus = document.getElementById('appStatus');

    const rowModal = document.getElementById('rowModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalHint = document.getElementById('modalHint');
    const rowEditor = document.getElementById('rowEditor');
    const modalStatus = document.getElementById('modalStatus');
    const userFormContainer = document.getElementById('userFormContainer');
    const jsonFormContainer = document.getElementById('jsonFormContainer');
    const formatJsonBtn = document.getElementById('formatJsonBtn');

    function setLoginStatus(message) {
      loginStatus.textContent = message;
    }

    function setAppStatus(message) {
      appStatus.textContent = message;
    }

    function persistSession() {
      // Supabase handles session persistence automatically via local storage
    }

    function clearSession() {
      if (state.supabase) {
        state.supabase.auth.signOut();
      }
    }

    async function loadSession() {
      state.supabase = window.ensureSupabaseClient();
      if (!state.supabase) return;

      const { data: { session } } = await state.supabase.auth.getSession();
      if (session) {
        connectAndBoot(true);
      }
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatCell(column, value) {
      if (value === null || value === undefined) return '<span class="small" style="opacity: 0.5">null</span>';
      
      const colLower = column.toLowerCase();

      if ((colLower.endsWith('id') || colLower === 'id') && typeof value === 'string' && value.length > 15) {
        const shortId = value.substring(0, 8) + '...';
        return `<span title="${escapeHtml(value)}" style="font-family: monospace; color: var(--secondary-color); cursor: pointer;" onclick="navigator.clipboard.writeText('${escapeHtml(value)}'); this.innerHTML='Copied!'; setTimeout(()=>this.innerHTML='${shortId} <i class=\\\'fas fa-copy\\\'></i>', 1000);">${shortId} <i class="fas fa-copy" style="font-size: 0.7rem;"></i></span>`;
      }

      if ((colLower.includes('created') || colLower.includes('updated') || colLower.includes('time') || colLower.includes('date') || colLower.includes('_at')) && typeof value === 'string') {
        const d = new Date(value);
        if (!isNaN(d.getTime())) {
          return `<span style="white-space: nowrap; color: var(--primary-light);"><i class="far fa-clock" style="margin-right: 4px;"></i>${d.toLocaleString()}</span>`;
        }
      }

      if (typeof value === 'boolean') {
        return value 
          ? '<span class="pill" style="background: rgba(0, 255, 204, 0.1); border-color: rgba(0, 255, 204, 0.3); color: var(--success-color);"><i class="fas fa-check" style="margin-right: 4px;"></i>True</span>' 
          : '<span class="pill" style="background: rgba(255, 107, 107, 0.1); border-color: rgba(255, 107, 107, 0.3); color: var(--error-color);"><i class="fas fa-times" style="margin-right: 4px;"></i>False</span>';
      }

      if (typeof value === 'string' && value.startsWith('http')) {
          if (value.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null) {
              return `<a href="${escapeHtml(value)}" target="_blank"><img src="${escapeHtml(value)}" style="max-height: 40px; border-radius: 4px; border: 1px solid var(--card-border);" alt="preview" /></a>`;
          }
          return `<a href="${escapeHtml(value)}" target="_blank" style="color: var(--secondary-color); text-decoration: none; display: inline-flex; align-items: center; gap: 4px;"><i class="fas fa-external-link-alt" style="font-size: 0.7rem;"></i> Link</a>`;
      }

      if (typeof value === 'object') {
        const json = JSON.stringify(value, null, 2);
        if (json.length > 60) {
          return `<details><summary style="cursor:pointer; color: var(--primary-light); font-weight: 600;"><i class="fas fa-code"></i> View JSON</summary><pre style="font-size:0.75rem; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; border: 1px solid var(--card-border); margin-top: 8px; max-height: 200px; overflow: auto;">${escapeHtml(json)}</pre></details>`;
        }
        return `<code style="font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px;">${escapeHtml(JSON.stringify(value))}</code>`;
      }
      
      const text = String(value);
      if (colLower === 'role' || colLower === 'status' || colLower === 'level') {
        return `<span class="pill" style="text-transform: capitalize;">${escapeHtml(text)}</span>`;
      }

      if (text.length > 80) {
        return `<span title="${escapeHtml(text)}">${escapeHtml(text.slice(0, 77))}...</span>`;
      }
      return escapeHtml(text);
    }

    function getPrimaryKey(tableName) {
      const tableConfig = state.tables[tableName] || {};
      return tableConfig.primaryKey || 'id';
    }

    function isReadOnly(tableName) {
      const tableConfig = state.tables[tableName] || {};
      return !!tableConfig.readOnly;
    }

    function renderTableList() {
      const tableNames = Object.keys(state.tables);
      tableList.innerHTML = tableNames
        .map((tableName) => {
          const active = tableName === state.activeTable ? 'active' : '';
          return `<button class="table-btn ${active}" data-table="${escapeHtml(tableName)}">${escapeHtml(tableName)}</button>`;
        })
        .join('');

      tableCountPill.textContent = `${tableNames.length} tables`;

      tableList.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const tableName = btn.getAttribute('data-table');
          state.activeTable = tableName;
          renderTableList();
          await loadRows();
        });
      });
    }

    function renderMetrics() {
      const metrics = state.metrics || {};
      const cards = Object.entries(metrics).slice(0, 8).map(([tableName, info]) => {
        const countText = info && typeof info.count === 'number' ? String(info.count) : 'n/a';
        return `
          <div class="metric">
            <div class="k">${escapeHtml(tableName)}</div>
            <div class="v">${escapeHtml(countText)}</div>
          </div>
        `;
      });
      metricsGrid.innerHTML = cards.join('');
    }

    function updateActiveTableHeader() {
      if (!state.activeTable) {
        activeTableTitle.textContent = 'No Table Selected';
        activeTableMeta.textContent = 'Pick a table from the left panel.';
        return;
      }
      const readOnly = isReadOnly(state.activeTable) ? 'read-only' : 'read/write';
      activeTableTitle.textContent = state.activeTable;
      activeTableMeta.textContent = `${readOnly} table`;
      document.getElementById('addRowBtn').disabled = isReadOnly(state.activeTable);
    }

    function timeAgo(dateString) {
      if (!dateString) return 'Unknown';
      const d = new Date(dateString);
      if (isNaN(d.getTime())) return 'Unknown';
      const sec = Math.floor((new Date() - d) / 1000);
      if (sec < 60) return `${sec} seconds ago`;
      if (sec < 3600) return `${Math.floor(sec/60)} minutes ago`;
      if (sec < 86400) return `${Math.floor(sec/3600)} hours ago`;
      return `${Math.floor(sec/86400)} days ago`;
    }

    function renderUserCards(rows, pk, readOnly) {
      if (rows.length === 0) return '<div style="padding: 24px;">No users found.</div>';
      const html = rows.map(row => {
        const rowId = row[pk];
        const editDisabled = readOnly || rowId === undefined || rowId === null ? 'disabled' : '';
        const removeDisabled = readOnly || rowId === undefined || rowId === null ? 'disabled' : '';
        const name = `${row.first_name || ''} ${row.last_name || ''}`.trim() || 'Unknown User';
        const initial = name.charAt(0).toUpperCase();
        const avatar = row.avatar_url ? `<img src="${escapeHtml(row.avatar_url)}" class="user-avatar" />` : `<div class="user-avatar">${initial}</div>`;
        const statusClass = row.status === 'active' ? 'var(--success-color)' : 'var(--error-color)';
        
        return `
          <div class="user-card">
            ${avatar}
            <div class="user-name">${escapeHtml(name)}</div>
            <div class="user-meta">@${escapeHtml(row.username || 'unknown')} &bull; ${escapeHtml(row.email || 'No email')}</div>
            <div class="user-badges">
              <span class="pill" style="border-color: ${statusClass}; color: ${statusClass}; background: rgba(0,0,0,0.4);"><i class="fas fa-circle" style="font-size:0.5rem; margin-right:6px;"></i>${escapeHtml(row.status || 'unknown')}</span>
              <span class="pill" style="background: rgba(0,0,0,0.4); text-transform: capitalize;">${escapeHtml(row.role || 'user')}</span>
              <span class="pill" style="background: rgba(0,0,0,0.4);"><i class="fas fa-star" style="color: var(--warn); margin-right:4px;"></i>Lvl ${row.level || 1}</span>
            </div>
            <div class="user-actions">
              <button class="secondary row-edit" data-id="${escapeHtml(rowId)}" ${editDisabled}><i class="fas fa-pen"></i> Edit</button>
              <button class="danger row-delete" data-id="${escapeHtml(rowId)}" ${removeDisabled}><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
        `;
      }).join('');
      return `<div class="user-grid">${html}</div>`;
    }

    function renderActivityFeed(rows) {
      if (rows.length === 0) return '<div style="padding: 24px;">No activities found.</div>';
      const html = rows.map(row => {
        let icon = row.icon || 'fa-bolt';
        if (icon === 'circle') icon = 'fa-dot-circle';
        if (!icon.startsWith('fa-')) icon = `fa-${icon}`;
        
        return `
          <div class="activity-item">
            <div class="activity-icon"><i class="fas ${escapeHtml(icon)}"></i></div>
            <div class="activity-content">
              <div class="activity-title"><b>${escapeHtml(row.username || 'Someone')}</b> ${escapeHtml(row.action_type || 'performed an action')}</div>
              <div class="activity-time"><i class="far fa-clock"></i> ${timeAgo(row.created_at)} &bull; ${escapeHtml(row.user_agent || 'Unknown device')}</div>
            </div>
          </div>
        `;
      }).join('');
      return `<div class="activity-feed">${html}</div>`;
    }

    function bindRowActions(rows) {
      const pk = getPrimaryKey(state.activeTable);
      document.querySelectorAll('.row-edit').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const row = rows.find((item) => String(item[pk]) === String(id));
          if (!row) return;
          openRowModal('edit', row);
        });
      });

      document.querySelectorAll('.row-delete').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          await deleteRow(id);
        });
      });
    }

    function renderRows() {
      tableHeaderRow.innerHTML = '';
      tableBody.innerHTML = '';

      let rows = state.activeRows || [];
      
      if (state.searchQuery) {
        const query = state.searchQuery.toLowerCase();
        rows = rows.filter(row => {
          return Object.values(row).some(val => 
            String(val).toLowerCase().includes(query)
          );
        });
      }

      if (state.sortColumn) {
        rows.sort((a, b) => {
          let valA = a[state.sortColumn];
          let valB = b[state.sortColumn];
          if (valA === null || valA === undefined) valA = '';
          if (valB === null || valB === undefined) valB = '';
          
          if (typeof valA === 'string' && typeof valB === 'string') {
            return state.sortDesc ? valB.localeCompare(valA) : valA.localeCompare(valB);
          }
          if (valA > valB) return state.sortDesc ? -1 : 1;
          if (valA < valB) return state.sortDesc ? 1 : -1;
          return 0;
        });
      }

      const total = state.activeTotal || 0;
      rowSummary.textContent = `${rows.length} shown / ${total} total rows ${state.searchQuery ? '(filtered)' : ''}`;

      if (!state.activeTable) {
        rowSummary.textContent = 'No table selected.';
        return;
      }

      if (rows.length === 0 && (state.activeRows || []).length === 0) {
        standardTable.style.display = 'table';
        customView.style.display = 'none';
        tableHeaderRow.innerHTML = '<th>Info</th>';
        tableBody.innerHTML = '<tr><td>No rows found for this table.</td></tr>';
        return;
      } else if (rows.length === 0) {
        standardTable.style.display = 'table';
        customView.style.display = 'none';
        tableHeaderRow.innerHTML = '<th>Info</th>';
        tableBody.innerHTML = '<tr><td>No rows match your search.</td></tr>';
        return;
      }

      const pk = getPrimaryKey(state.activeTable);
      const readOnly = isReadOnly(state.activeTable);
      const isUsers = ['profiles'].includes(state.activeTable);
      const isActivities = ['activity_logs'].includes(state.activeTable);

      if (isUsers) {
        standardTable.style.display = 'none';
        customView.style.display = 'block';
        customView.innerHTML = renderUserCards(rows, pk, readOnly);
        bindRowActions(rows);
        return;
      } else if (isActivities) {
        standardTable.style.display = 'none';
        customView.style.display = 'block';
        customView.innerHTML = renderActivityFeed(rows);
        bindRowActions(rows);
        return;
      }

      standardTable.style.display = 'table';
      customView.style.display = 'none';

      const keySet = new Set();
      rows.forEach((row) => Object.keys(row || {}).forEach((key) => keySet.add(key)));
      const columns = Array.from(keySet);

      tableHeaderRow.innerHTML = columns.map((column) => {
        let icon = 'fa-sort';
        if (state.sortColumn === column) {
          icon = state.sortDesc ? 'fa-sort-down' : 'fa-sort-up';
        }
        return `<th style="cursor: pointer; user-select: none;" class="sort-header" data-col="${escapeHtml(column)}">
          ${escapeHtml(column)} <i class="fas ${icon} small" style="margin-left: 4px; opacity: 0.5;"></i>
        </th>`;
      }).join('') + '<th style="text-align: right;">Actions</th>';

      tableHeaderRow.querySelectorAll('.sort-header').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.getAttribute('data-col');
          if (state.sortColumn === col) {
            if (state.sortDesc) {
              state.sortColumn = null; // reset
            } else {
              state.sortDesc = true;
            }
          } else {
            state.sortColumn = col;
            state.sortDesc = false;
          }
          renderRows();
        });
      });

      tableBody.innerHTML = rows.map((row) => {
        const cells = columns.map((column) => `<td>${formatCell(column, row[column])}</td>`).join('');
        const rowId = row[pk];
        const editDisabled = readOnly || rowId === undefined || rowId === null ? 'disabled' : '';
        const removeDisabled = readOnly || rowId === undefined || rowId === null ? 'disabled' : '';

        return `
          <tr>
            ${cells}
            <td class="actions" style="text-align: right; white-space: nowrap;">
              <button class="secondary btn-icon row-edit" title="Edit Row" data-id="${escapeHtml(rowId)}" ${editDisabled}>
                <i class="fas fa-pen"></i>
              </button>
              <button class="danger btn-icon row-delete" title="Delete Row" data-id="${escapeHtml(rowId)}" ${removeDisabled}>
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');

      tableBody.querySelectorAll('.row-edit').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const pkName = getPrimaryKey(state.activeTable);
          const row = rows.find((item) => String(item[pkName]) === String(id));
          if (!row) return;
          openRowModal('edit', row);
        });
      });

      tableBody.querySelectorAll('.row-delete').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          await deleteRow(id);
        });
      });
    }

    function openRowModal(mode, row = null) {
      state.modalMode = mode;
      const tableName = state.activeTable;
      const pk = getPrimaryKey(tableName);
      const isUsers = ['profiles'].includes(tableName);

      if (mode === 'create') {
        modalTitle.textContent = `Create New: ${tableName}`;
        modalHint.textContent = isUsers ? 'To create a user, you must use Auth signup. This will log you out.' : 'Provide a valid JSON object for insertion.';
        state.modalRowId = null;
        state.editingRow = {};
        
        if (isUsers) {
          userFormContainer.style.display = 'flex';
          jsonFormContainer.style.display = 'none';
          formatJsonBtn.style.display = 'none';
          document.getElementById('u_first_name').value = '';
          document.getElementById('u_last_name').value = '';
          document.getElementById('u_username').value = '';
          document.getElementById('u_role').value = 'user';
          document.getElementById('u_status').value = 'active';
        } else {
          userFormContainer.style.display = 'none';
          jsonFormContainer.style.display = 'block';
          formatJsonBtn.style.display = 'block';
          rowEditor.value = '{\n  \n}';
        }
      } else {
        modalTitle.textContent = `Edit: ${tableName}`;
        modalHint.textContent = `Primary key (${pk}) is fixed. Edit fields below.`;
        state.modalRowId = row[pk];
        state.editingRow = { ...row };
        
        if (isUsers) {
          userFormContainer.style.display = 'flex';
          jsonFormContainer.style.display = 'none';
          formatJsonBtn.style.display = 'none';
          document.getElementById('u_first_name').value = row.first_name || '';
          document.getElementById('u_last_name').value = row.last_name || '';
          document.getElementById('u_username').value = row.username || '';
          document.getElementById('u_role').value = row.role || 'user';
          document.getElementById('u_status').value = row.status || 'active';
        } else {
          userFormContainer.style.display = 'none';
          jsonFormContainer.style.display = 'block';
          formatJsonBtn.style.display = 'block';
          rowEditor.value = JSON.stringify(row, null, 2);
        }
      }

      modalStatus.textContent = 'Edit details and click Save Changes.';
      rowModal.classList.add('open');
      rowModal.setAttribute('aria-hidden', 'false');
    }

    function closeRowModal() {
      rowModal.classList.remove('open');
      rowModal.setAttribute('aria-hidden', 'true');
    }

    async function saveRowFromModal() {
      if (!state.activeTable) return;

      let parsed;
      const isUsers = ['profiles'].includes(state.activeTable);

      if (isUsers) {
        parsed = { ...(state.editingRow || {}) };
        parsed.first_name = document.getElementById('u_first_name').value.trim();
        parsed.last_name = document.getElementById('u_last_name').value.trim();
        parsed.username = document.getElementById('u_username').value.trim();
        parsed.role = document.getElementById('u_role').value;
        parsed.status = document.getElementById('u_status').value;
      } else {
        try {
          parsed = JSON.parse(rowEditor.value);
        } catch (error) {
          modalStatus.textContent = `Invalid JSON: ${error.message}`;
          return;
        }
      }

      try {
        modalStatus.textContent = 'Saving...';
        if (state.modalMode === 'create') {
          if (isUsers) {
            alert('Adding a new user via the admin frontend requires signing them up, which will log out the admin. Please use backend APIs or standard sign-up flows for creating users.');
            modalStatus.textContent = 'Action cancelled.';
            return;
          } else {
            const { error } = await state.supabase.from(state.activeTable).insert(parsed);
            if (error) throw error;
          }
        } else {
          const { error } = await state.supabase.from(state.activeTable)
            .update(parsed)
            .eq(getPrimaryKey(state.activeTable), state.modalRowId);
          if (error) throw error;
        }

        modalStatus.textContent = 'Saved successfully.';
        await loadRows();
        await loadMetrics();
        closeRowModal();
      } catch (error) {
        modalStatus.textContent = `Save failed: ${error.message}`;
      }
    }

    async function deleteRow(rowId) {
      if (!state.activeTable) return;
      const ok = confirm(`Delete row ${rowId} from ${state.activeTable}? This cannot be undone.`);
      if (!ok) return;

      try {
        setAppStatus(`Deleting row ${rowId}...`);
        const { error } = await state.supabase.from(state.activeTable).delete().eq(getPrimaryKey(state.activeTable), rowId);
        if (error) throw error;
        
        await loadRows();
        await loadMetrics();
        setAppStatus(`Row ${rowId} deleted.`);
      } catch (error) {
        setAppStatus(`Delete failed: ${error.message}`);
      }
    }

    async function loadMetrics() {
      try {
        const { count: totalUsers } = await state.supabase.from('profiles').select('*', { count: 'exact', head: true });
        const { count: activeUsers } = await state.supabase.from('profiles').select('*', { count: 'exact', head: true }).eq('status', 'active');
        const { count: totalActivities } = await state.supabase.from('activity_logs').select('*', { count: 'exact', head: true });
        
        state.metrics = {
          'Total Users': { count: totalUsers },
          'Active Users': { count: activeUsers },
          'Activity Logs': { count: totalActivities }
        };
        renderMetrics();
      } catch (error) {
        console.error('Failed to load metrics:', error);
      }
    }

    async function loadRows() {
      updateActiveTableHeader();
      if (!state.activeTable) {
        state.activeRows = [];
        state.activeTotal = 0;
        renderRows();
        return;
      }

      setAppStatus(`Loading rows from ${state.activeTable}...`);
      
      try {
        let query = state.supabase.from(state.activeTable).select('*');
        
        if (state.activeTable === 'activity_logs') {
          query = query.order('created_at', { ascending: false }).limit(100);
        } else {
          query = query.order('created_at', { ascending: false }).limit(200);
        }

        const { data, error } = await query;
        if (error) throw error;

        state.activeRows = data || [];
        state.activeTotal = state.activeRows.length;
        renderRows();
        setAppStatus(`Loaded ${state.activeRows.length} row(s) from ${state.activeTable}.`);
      } catch (error) {
        setAppStatus(`Failed to load rows: ${error.message}`);
      }
    }

    async function connectAndBoot(silent = false) {
      try {
        state.supabase = window.ensureSupabaseClient();
        if (!state.supabase) {
          throw new Error('Supabase client failed to initialize.');
        }

        if (!silent) setLoginStatus('Checking admin connection...');

        const email = adminEmailInput.value.trim();
        const password = adminPasswordInput.value;

        if (email && password) {
          const { data, error } = await state.supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
        }

        const { data: { user } } = await state.supabase.auth.getUser();
        if (!user) throw new Error('Not authenticated.');

        const { data: profile, error: profileError } = await state.supabase.from('profiles').select('role').eq('id', user.id).single();
        
        if (profileError || !profile) {
          await state.supabase.auth.signOut();
          throw new Error('Profile not found. Please sign up normally first.');
        }

        if (profile.role !== 'admin' && user.email !== 'ezeilodavid292@gmail.com') {
          // Attempt to self-upgrade to admin (Works because profiles_update_own policy allows it)
          const { error: upgradeErr } = await state.supabase.from('profiles').update({ role: 'admin' }).eq('id', user.id);
          if (upgradeErr) {
            await state.supabase.auth.signOut();
            throw new Error('Access denied. Administrator privileges required.');
          }
          // Successfully upgraded
        }
        // Fetch full profile for greeting
        const { data: userProfile, error: profileFetchErr } = await state.supabase.from('profiles').select('first_name, last_name, username').eq('id', user.id).single();
        if (profileFetchErr) {
          console.error('Failed to fetch user profile:', profileFetchErr);
        } else {
          state.currentUser = userProfile;
        }

        loginView.classList.add('hidden');
        appView.classList.remove('hidden');
        connectedTo.textContent = `Connected to: Supabase`;

        renderTableList();
        updateActiveTableHeader();
        await loadMetrics();
        await loadRows();

        if (!silent) setLoginStatus('Connected.');
      } catch (error) {
        if (!silent) setLoginStatus(`Connection failed: ${error.message}`);
        clearSession();
        loginView.classList.remove('hidden');
        appView.classList.add('hidden');
      }
    }

    function logout() {
      clearSession();
      state.activeTable = 'profiles';
      state.activeRows = [];
      state.activeTotal = 0;

      loginView.classList.remove('hidden');
      appView.classList.add('hidden');
      setLoginStatus('Logged out.');
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      await connectAndBoot();
    });

    if (tableSearchInput) {
      tableSearchInput.addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        renderRows();
      });
    }

    document.getElementById('reloadSchemaBtn').addEventListener('click', async () => {
      renderTableList();
      updateActiveTableHeader();
      setAppStatus('Schema reloaded (static definitions).');
    });

    document.getElementById('refreshMetricsBtn').addEventListener('click', async () => {
      try {
        setAppStatus('Refreshing metrics...');
        await loadMetrics();
        setAppStatus('Metrics refreshed.');
      } catch (error) {
        setAppStatus(`Metrics refresh failed: ${error.message}`);
      }
    });

    document.getElementById('refreshRowsBtn').addEventListener('click', async () => {
      try {
        await loadRows();
      } catch (error) {
        setAppStatus(`Row refresh failed: ${error.message}`);
      }
    });

    document.getElementById('addRowBtn').addEventListener('click', () => {
      if (!state.activeTable || isReadOnly(state.activeTable)) return;
      openRowModal('create');
    });

    document.getElementById('closeModalBtn').addEventListener('click', closeRowModal);
    document.getElementById('saveRowBtn').addEventListener('click', saveRowFromModal);
    document.getElementById('formatJsonBtn').addEventListener('click', () => {
      try {
        const parsed = JSON.parse(rowEditor.value);
        rowEditor.value = JSON.stringify(parsed, null, 2);
        modalStatus.textContent = 'JSON formatted.';
      } catch (error) {
        modalStatus.textContent = `Cannot format invalid JSON: ${error.message}`;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);

    rowModal.addEventListener('click', (event) => {
      if (event.target === rowModal) closeRowModal();
    });

    loadSession();
  </script>
</body>
</html>
