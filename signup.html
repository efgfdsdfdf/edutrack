<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | ACE Student Companion</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
  
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/settings-manager.js"></script>
  <script src="assets/js/notifications.js"></script>

  <!-- Load Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  
  <style>
    /* ===== MODERN CYBERPUNK GLASSMORPHISM THEME (INDEX-ALIGNED) ===== */
    :root {
      --primary-color: #7b61ff;
      --primary-dark: #6749ff;
      --primary-light: #9d8aff;
      --secondary-color: #00ffcc;
      --accent-color: #ff00ff;
      --background-dark: #0f0f2f;
      --background-darker: #06060a;
      --card-bg: rgba(30, 30, 46, 0.7);
      --card-border: rgba(123, 97, 255, 0.2);
      --text-light: #ffffff;
      --text-muted: #bbbbbb;
      --text-gray: #888888;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --gradient: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      --error-color: #ff6b6b;
      --success-color: #00ffcc;
      --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, var(--background-darker), var(--background-dark));
      color: var(--text-light);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-elements {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-element {
      position: absolute;
      border-radius: 50%;
      background: rgba(123, 97, 255, 0.08);
      animation: float 20s infinite linear;
    }

    .bg-element:nth-child(1) { width: 400px; height: 400px; top: -10%; left: -5%; animation-delay: 0s; }
    .bg-element:nth-child(2) { width: 300px; height: 300px; bottom: -5%; right: -5%; animation-delay: -5s; }
    .bg-element:nth-child(3) { width: 200px; height: 200px; top: 40%; left: 15%; animation-delay: -10s; background: rgba(0, 255, 204, 0.05); }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0.5; }
      33% { transform: translate(30px, 50px) rotate(120deg); opacity: 0.8; }
      66% { transform: translate(-20px, 20px) rotate(240deg); opacity: 0.6; }
      100% { transform: translate(0, 0) rotate(360deg); opacity: 0.5; }
    }

    .signup-container {
      width: 100%;
      max-width: 500px;
      padding: 24px;
      animation: fadeInUp 0.8s ease;
      z-index: 10;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      font-size: 3rem;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(123, 97, 255, 0.4));
      display: inline-block;
    }

    .brand-title {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .signup-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 40px;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .signup-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--gradient);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px 12px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: rgba(123, 97, 255, 0.08);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-gray);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-gray);
      cursor: pointer;
      padding: 8px;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(123, 97, 255, 0.4);
    }

    .login-prompt {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
    }

    .login-link {
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 700;
      margin-left: 6px;
    }

    @media (max-width: 480px) {
      .signup-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-elements">
    <div class="bg-element"></div>
    <div class="bg-element"></div>
    <div class="bg-element"></div>
  </div>

  <div class="signup-container">
    <header class="brand-header">
      <div class="brand-logo"><i class="fas fa-cube"></i></div>
      <h1 class="brand-title">Join ACE Academy</h1>
    </header>

    <main class="signup-card">
      <form id="signupForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" id="firstName" class="form-input" style="padding-left: 16px;" placeholder="John" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" id="lastName" class="form-input" style="padding-left: 16px;" placeholder="Doe" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="signupEmail" class="form-input" placeholder="name@example.com" required>
            <i class="fas fa-envelope input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrapper">
            <input type="text" id="signupUsername" class="form-input" placeholder="johndoe123" required>
            <i class="fas fa-user input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
            <i class="fas fa-lock input-icon"></i>
            <button type="button" class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="signupButton">
          <i class="fas fa-user-plus"></i>
          <span>Create Account</span>
        </button>
      </form>

      <div class="login-prompt">
        Already have an account? <a href="index.html" class="login-link">Sign In</a>
      </div>
    </main>
  </div>

  <div id="notificationContainer"></div>

  <script>
    const SUPABASE_URL = 'https://vssvuwllpbnbdgcchzzt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzc3Z1d2xscGJuYmRnY2Noenp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MjIyMDYsImV4cCI6MjA4OTk5ODIwNn0.wI2A6SzjYP0GM1_6C74VtTZwJLpg8BogkPe-WdZAOac';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', () => {
      if (window.AceNotifications) window.AceNotifications.init();
      
      document.getElementById('togglePassword').onclick = () => {
        const input = document.getElementById('signupPassword');
        const icon = document.getElementById('togglePassword').querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      };

      document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const username = document.getElementById('signupUsername').value;

        const btn = document.getElementById('signupButton');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

        try {
          const { error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { first_name: firstName, last_name: lastName, username } }
          });
          if (error) throw error;
          window.AceNotifications.show('Registration successful! Please verify your email.', 'success');
          setTimeout(() => window.location.href = 'index.html', 3000);
        } catch (error) {
          window.AceNotifications.show(error.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
      };
    });
  </script>
</body>
</html>
